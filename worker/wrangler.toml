name = "serviceflow-intent"
main = "index.js"
compatibility_date = "2024-12-01"

# Cloudflare Workers AI — Llama 3.1 8B Instruct. No external API, no secret.
[ai]
binding = "AI"

# CORS locked to the live demo origin. Override via:
#   AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"  # if Llama 3.1 8B drifts on noisy transcripts
[vars]
ALLOWED_ORIGIN = "https://service-flow.dev"
