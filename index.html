<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>ServiceFlow · W Taipei</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230891B2'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='-apple-system,Segoe UI,sans-serif' font-size='14' font-weight='700' fill='white'%3ESF%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Palette v8 — slate/teal/white per brief Fix #3.
     Champagne retained as legacy W-Hotels accent (brief silent on it). */
  --champagne:#A0784A; --champagne-light:#C9A97A; --champagne-dark:#7A5A32; --champagne-pale:#F0E8DA;
  --bronze:#A0784A; --bronze-light:#C9A97A; --bronze-dark:#7A5A32; --bronze-pale:#F0E8DA;
  --ivory:#FFFFFF; --warm-white:#FFFFFF; --marble:#F7F4EF; --marble-dark:#E5E7EB;
  --charcoal:#2C3E50; --mid-grey:#6B7280; --light-grey:#9CA3AF;
  --blue:#0891B2; --blue-dark:#0E7490; --blue-pale:#CFFAFE;
  --w-blue:#0891B2; --w-blue-dark:#0E7490; --w-blue-pale:#CFFAFE;
  --mag:#BE185D; --w-mag:#BE185D; --w-mag-dark:#9F174A; --w-mag-pale:#FCE7F3;
  --esg:#16A34A; --esg-pale:#DCFCE7; --amber:#B9770F; --amber-pale:#FBF1E2; --red-alert:#BE185D;
  --green:#15803D; --green-pale:#DCFCE7;
  --shadow:0 8px 32px rgba(44,62,80,0.10); --shadow-sm:0 2px 10px rgba(44,62,80,0.07);
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{
  background:#0F1B2A;font-family:'Jost',-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background-image:radial-gradient(ellipse at 20% 80%,rgba(8,145,178,.16) 0%,transparent 50%),
                   radial-gradient(ellipse at 80% 20%,rgba(190,24,93,.10) 0%,transparent 45%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--charcoal);
}
.phone{
  width:390px;height:844px;background:var(--marble);border-radius:48px;overflow:hidden;
  position:relative;flex-shrink:0;font-size:14px;display:flex;flex-direction:column;
  box-shadow:0 48px 120px rgba(0,0,0,.6),0 0 0 1px rgba(8,145,178,.18);
}
@media(max-width:440px){body{padding:0}.phone{width:100vw;height:100vh;border-radius:0;box-shadow:none}}

#loader{position:absolute;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--charcoal) 0%,#1F2937 60%,#0F1B2A 100%);transition:opacity .9s ease;overflow:hidden}
#loader.hide{opacity:0;pointer-events:none}
.ld-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,169,122,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,122,.04) 1px,transparent 1px);background-size:44px 44px}
.ld-glow{position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(8,145,178,.10) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
.ld-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;text-align:center;padding:0 30px}
.ld-mark{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--ivory)}
.ld-rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--champagne-light),transparent);margin:14px auto 10px;animation:ruleIn .7s ease .4s forwards}
@keyframes ruleIn{to{width:110px}}
.ld-sub{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,169,122,.75)}
.ld-bar-wrap{width:220px;height:2px;background:rgba(201,169,122,.12);border-radius:2px;overflow:hidden;margin-top:44px}
.ld-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--champagne-dark),var(--champagne-light),#E8D090);background-size:200% 100%;animation:shimmer 1.8s linear infinite;box-shadow:0 0 10px rgba(201,169,122,.4);transition:width .25s ease;width:0}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.ld-pct{margin-top:12px;font-size:13px;color:var(--champagne-light);font-family:monospace;letter-spacing:.14em}
.ld-foot{position:absolute;bottom:28px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.50);text-align:center;width:100%;padding:0 20px}

.sbar{height:44px;padding:0 12px 0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:5;color:var(--ivory)}
.sbar.dk{background:var(--charcoal)}
.sbar.role{background:#0D1B2A;color:rgba(255,255,255,.95)}
.sbar.bl{background:var(--w-blue-dark)}
.sbar.mg{background:var(--w-mag-dark)}
.sbar.gn{background:#1B3725}
.sbar.br{background:var(--champagne-dark)}
.stime{font-weight:600;font-size:14px;letter-spacing:.02em}
.sicons{display:flex;align-items:center;gap:8px;opacity:.85}
.sicons .sig{display:flex;gap:2px;align-items:flex-end}
.sicons .sig span{width:3px;height:3px;border-radius:50%;background:currentColor}
.sicons .sig span:nth-child(2){height:4px}.sicons .sig span:nth-child(3){height:5px}
.sicons .bat svg{display:block}
.back-role{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--champagne-light);background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-weight:600;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;transition:background .15s}
.back-role:hover{background:rgba(245,240,232,.06)}

#screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:120px}
#screen::-webkit-scrollbar{display:none}

.hero{padding:16px 20px 22px;position:relative;overflow:hidden;color:var(--ivory);margin-bottom:18px}
.hero.dk{background:linear-gradient(170deg,var(--charcoal) 0%,#1F2937 100%)}
.hero.bl{background:linear-gradient(170deg,var(--w-blue-dark) 0%,var(--w-blue) 100%)}
.hero.mg{background:linear-gradient(170deg,var(--w-mag-dark) 0%,var(--w-mag) 100%)}
.hero.gn{background:linear-gradient(170deg,#1B3725 0%,var(--esg) 100%)}
.hero.br{background:linear-gradient(170deg,var(--champagne-dark) 0%,var(--champagne) 100%)}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.10)}

.brand-row{position:relative;z-index:1;display:flex;align-items:center;gap:11px;margin-bottom:14px}
.w-mono{width:30px;height:30px;border:1px solid rgba(255,255,255,.35);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.95);flex-shrink:0;letter-spacing:.02em}
.brand-name{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#B8962E;font-weight:600;flex:1}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(8,145,178,.12);border:1px solid rgba(8,145,178,.32);padding:4px 9px;border-radius:18px;font-size:11px;color:var(--w-blue);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.live-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--w-blue);animation:pulse 2s infinite;box-shadow:0 0 6px rgba(8,145,178,.6)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.hero h1{position:relative;z-index:1;font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;line-height:1.05;margin:8px 0 8px;letter-spacing:-.005em;color:var(--ivory)}
.hero h1 em{font-style:italic;color:var(--ivory);font-weight:400;opacity:.85}
.hero-sub{position:relative;z-index:1;font-size:12.5px;line-height:1.55;color:rgba(245,240,232,.7);max-width:94%}

.meta-line{position:relative;z-index:1;display:flex;gap:7px;align-items:center;font-size:13px;color:rgba(245,240,232,.65);font-weight:400;margin-top:10px;font-family:'Jost',sans-serif;flex-wrap:wrap}
.meta-line .sep{width:3px;height:3px;border-radius:50%;background:rgba(245,240,232,.4);flex-shrink:0}

.body{padding:0 20px}
.sec-h{display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px}
.sec-h h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--charcoal);letter-spacing:-.005em}
.sec-h .sa{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--champagne-dark);background:none;border:none;font-weight:600;font-family:'Jost',sans-serif}
.sec-h button.sa{cursor:pointer}
.divider{height:1px;margin:4px 0 12px;background:linear-gradient(90deg,transparent,var(--marble-dark),transparent)}
.eyebrow{display:flex;align-items:center;gap:9px;font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--mid-grey);font-weight:600;margin-bottom:10px}
.eyebrow::before{content:'';display:inline-block;width:6px;height:6px;background:var(--champagne)}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:14px;padding:13px;box-shadow:0 2px 10px rgba(20,20,30,.07)}
.kpi .k{font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mid-grey)}
.kpi .v{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;color:var(--charcoal);line-height:1.05;margin-top:5px;letter-spacing:-.01em}
.kpi .v small{font-family:'Jost',sans-serif;font-size:12px;font-weight:500;color:var(--mid-grey);letter-spacing:.02em;margin:0 2px}
.kpi .v.blue{color:var(--w-blue-dark)}.kpi .v.mag{color:var(--w-mag-dark)}.kpi .v.gn{color:var(--esg)}.kpi .v.br{color:var(--champagne-dark)}
.kpi .d{font-size:11px;color:var(--mid-grey);margin-top:4px;line-height:1.3}
.trend{font-size:11px;line-height:1.3;margin-top:6px;font-weight:400;color:var(--mid-grey);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.log-trend{font-size:11px;color:#6B7280;text-align:center;margin-top:6px;line-height:1.3}

.score{display:flex;gap:7px}
.score .g{flex:1;text-align:center;background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:13px;padding:11px 5px;box-shadow:var(--shadow-sm)}
.score .v{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;line-height:1;letter-spacing:-.01em;color:var(--charcoal)}
.score .k{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mid-grey);margin-top:5px}
.score .glabel{font-size:10px;color:#6B7280;font-weight:600;margin-top:4px;line-height:1.3;padding:0 2px;letter-spacing:.01em}
.score .gcrit{font-size:9px;color:var(--mid-grey);margin-top:3px;line-height:1.35;padding:0 2px;opacity:.78}

.log-cta-wrap{position:sticky;bottom:0;z-index:5;padding:10px 0 14px;background:linear-gradient(to top,var(--marble) 0%,var(--marble) 70%,rgba(247,244,239,0) 100%);margin:4px -2px 0}
.log-cta{width:100%;min-height:48px;background:#0891B2;color:#fff;border:none;border-radius:16px;padding:12px 18px;font-family:'Jost',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 18px rgba(8,145,178,.28)}
.log-cta:active{background:#0E7490}

.ab-box{background:var(--charcoal);border-radius:18px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;color:var(--ivory);box-shadow:var(--shadow)}
.ab-box::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent 0,transparent 44px,rgba(201,169,122,.04) 44px,rgba(201,169,122,.04) 45px);pointer-events:none}
.ab-eb{position:relative;z-index:1;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--champagne-light);font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ab-eb::before{content:'';display:inline-block;width:6px;height:6px;background:var(--champagne-light)}
.ab-h{position:relative;z-index:1;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--ivory);line-height:1.2;margin-bottom:14px;letter-spacing:-.005em}
.ab-h em{font-style:italic;color:var(--champagne-light);font-weight:400}
.ab-item{position:relative;z-index:1;display:flex;gap:13px;padding:11px 0;border-bottom:1px solid rgba(201,169,122,.08);align-items:flex-start}
.ab-item:last-of-type{border-bottom:none}
.ab-ring{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--champagne);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:500;color:var(--champagne-light);flex-shrink:0;margin-top:1px}
.ab-body{flex:1}
.ab-tx{font-size:13.5px;line-height:1.45;color:var(--ivory);font-weight:500}
.ab-meta{font-size:11.5px;color:rgba(245,240,232,.55);margin-top:4px;line-height:1.4}
.ab-save{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:#7AB67A;text-align:right;flex-shrink:0;align-self:center;letter-spacing:-.005em;min-width:78px}
.ab-save.zero{color:rgba(245,240,232,.65);font-size:14px}
.ab-recap{position:relative;z-index:1;margin-top:14px;padding-top:14px;border-top:1px solid rgba(201,169,122,.2);display:flex;justify-content:space-between;align-items:baseline}
.ab-recap-l{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,240,232,.6);font-weight:600}
.ab-recap-v{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--champagne-light);letter-spacing:-.005em}

.st-row{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow-sm)}
.st-badge{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:60px}
.st-body{flex:1;min-width:0}
.st-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--charcoal);letter-spacing:-.005em;line-height:1.1}
.st-prep{font-size:12.5px;color:var(--charcoal);margin-top:5px;line-height:1.4;font-weight:500}
.st-prep b{color:var(--w-blue-dark);font-weight:600;font-family:'Cormorant Garamond',serif;font-size:14px}
.st-cause{font-size:11.5px;color:var(--mid-grey);margin-top:4px;line-height:1.4}
.st-waste{font-size:10.5px;color:var(--mid-grey);margin-top:6px;letter-spacing:.04em}
.st-pct{display:inline-block;font-family:'Jost',sans-serif;font-size:12px;font-weight:800;letter-spacing:.02em;padding:4px 10px;border-radius:7px;white-space:nowrap;flex-shrink:0;align-self:center;min-width:54px;text-align:center;line-height:1.2}
.st-pct.up{color:#0D6B35;background:#C8F0DA}
.st-pct.down{color:#A3003A;background:#FFD6E0}
.st-pct.flat{color:var(--mid-grey);background:rgba(0,0,0,.04)}

.esg-card{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:16px;padding:14px 16px;margin-bottom:13px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.esg-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--esg),var(--champagne));border-radius:16px 0 0 16px}
.esg-card .ico{width:38px;height:38px;border-radius:11px;background:rgba(74,143,94,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.esg-card .ico svg{width:19px;height:19px;stroke:var(--esg);fill:none;stroke-width:1.9}
.esg-card .esg-body{flex:1}
.esg-card .esg-h{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--champagne-dark);font-weight:700}
.esg-card .esg-t{font-size:13px;font-weight:600;color:var(--charcoal);margin-top:3px;line-height:1.35}
.esg-card .esg-m{font-size:11.5px;color:var(--mid-grey);margin-top:3px;line-height:1.4}

.day-toggle{display:flex;background:#E5E7EB;border-radius:22px;padding:3px;gap:0;margin-bottom:10px}
.day-toggle button{flex:1;padding:8px 4px;border:none;background:none;border-radius:18px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.08em;color:var(--mid-grey);cursor:pointer;font-weight:600;transition:all .18s;min-width:0}
.day-toggle button.on{background:var(--w-blue);color:#fff;box-shadow:0 2px 8px rgba(8,145,178,.3);font-weight:700}
.day-story{font-size:11.5px;color:var(--mid-grey);margin-bottom:14px;line-height:1.35;padding:0 4px}
.day-story b{color:var(--charcoal);font-weight:600}
.week-bar{display:flex;justify-content:space-between;gap:8px;background:var(--charcoal);color:var(--ivory);border-radius:14px;padding:12px 14px;margin-bottom:13px;align-items:center;box-shadow:var(--shadow-sm)}
.week-bar .wb-l{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;flex-shrink:0}
.week-bar .wb-stats{display:flex;gap:14px;align-items:baseline}
.week-bar .wb-v{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:#fff;letter-spacing:-.005em;line-height:1}
.week-bar .wb-k{font-size:9px;color:rgba(255,255,255,.55);letter-spacing:.14em;text-transform:uppercase;margin-top:2px;display:block}

.card{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:18px;padding:16px 18px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
.card.flat{box-shadow:none;background:var(--marble);border-color:var(--marble-dark)}

.rolecard{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:18px;padding:18px;margin-bottom:11px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);transition:transform .12s;position:relative;overflow:hidden}
.rolecard::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent 0,transparent 44px,rgba(160,120,74,.04) 44px,rgba(160,120,74,.04) 45px);pointer-events:none}
.rolecard:active{transform:scale(.985)}
.rolecard .ico{width:48px;height:48px;border-radius:13px;background:var(--w-blue-pale);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.rolecard .ico svg{width:24px;height:24px;stroke:var(--w-blue-dark);fill:none;stroke-width:1.9}
.rolecard.mg .ico{background:var(--w-mag-pale)}.rolecard.mg .ico svg{stroke:var(--w-mag-dark)}
.rolecard.br .ico{background:var(--champagne-pale)}.rolecard.br .ico svg{stroke:var(--champagne-dark)}
.rolecard .t{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:18px;color:var(--charcoal);position:relative;z-index:1;letter-spacing:-.005em;line-height:1.15}
.rolecard .d{font-size:11.5px;color:var(--mid-grey);margin-top:3px;position:relative;z-index:1}
.badge{display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.18em;padding:3px 8px;border-radius:6px;background:var(--esg-pale);color:var(--esg);vertical-align:middle;text-transform:uppercase;margin-left:6px}

.dash-tile{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:16px;padding:14px 15px;margin-bottom:10px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s}
.dash-tile:active{transform:scale(.985)}
.dash-i{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dash-i svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9}
.dash-b{flex:1;min-width:0}
.dash-t{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--charcoal);letter-spacing:-.005em;line-height:1.12}
.dash-d{font-size:11.5px;color:var(--mid-grey);margin-top:4px;line-height:1.4}
.dash-arrow{font-size:22px;color:var(--champagne);flex-shrink:0;font-family:'Cormorant Garamond',serif;font-weight:400}

.otabs{display:flex;background:var(--warm-white);border-bottom:1px solid var(--marble);overflow-x:auto;scrollbar-width:none;margin:0 -20px 14px;padding:0 16px}
.otabs::-webkit-scrollbar{display:none}
.otab{padding:11px 13px;font-size:11.5px;letter-spacing:.04em;font-family:'Jost',sans-serif;font-weight:500;cursor:pointer;border:none;background:none;color:var(--mid-grey);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .2s}
.otab.on{color:var(--w-mag-dark);border-bottom-color:var(--w-mag)}

.strike{background:linear-gradient(170deg,#1F2937 0%,var(--charcoal) 100%);color:var(--ivory);border-radius:20px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid rgba(190,24,93,.25)}
.strike::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent 0,transparent 44px,rgba(201,169,122,.04) 44px,rgba(201,169,122,.04) 45px);pointer-events:none}
.strike .strike-skyline{position:absolute;right:0;bottom:0;pointer-events:none;z-index:0}
.strike .st-eb{position:relative;z-index:1;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--w-mag);font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:10px}
.strike .st-eb::before{content:'';display:inline-block;width:6px;height:6px;background:var(--w-mag)}
.strike .st-tt{position:relative;z-index:1;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;line-height:1.2;color:var(--ivory);margin-bottom:12px;letter-spacing:-.005em}
.strike .st-tt em{font-style:italic;color:var(--champagne-light);font-weight:400}
.strike .st-grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}
.strike .st-tile{background:rgba(255,255,255,.04);border:1px solid rgba(245,240,232,.08);border-radius:11px;padding:10px 8px;text-align:center}
.strike .st-tile .v{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--champagne-light);line-height:1;letter-spacing:-.005em}
.strike .st-tile .k{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,240,232,.65);margin-top:5px}

.prow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--marble);gap:10px}
.prow:last-child{border-bottom:none}
.prow .nm{font-weight:600;font-size:13.5px;color:var(--charcoal)}
.prow .rs{font-size:11.5px;color:var(--mid-grey);margin-top:3px;line-height:1.4;max-width:200px}
.prow .pr{text-align:right;flex-shrink:0}
.prow .pr b{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--charcoal);letter-spacing:-.01em}
.prow .pr small{font-size:10px;color:var(--mid-grey);display:block;margin-top:1px;letter-spacing:.04em}

.delta{display:inline-block;font-family:'Jost',sans-serif;font-weight:800;font-size:12px;padding:3px 9px;border-radius:6px;white-space:nowrap;letter-spacing:.02em;line-height:1.25}
.delta.up{color:#0D6B35;background:#C8F0DA}
.delta.down{color:#A3003A;background:#FFD6E0}
.delta.flat{color:var(--mid-grey);background:rgba(0,0,0,.05)}

.gate{display:flex;gap:14px}
.gate .line{display:flex;flex-direction:column;align-items:center;flex:0 0 15px}
.gate .node{width:14px;height:14px;border-radius:50%;border:3px solid var(--warm-white);box-shadow:0 0 0 1px var(--marble-dark);flex-shrink:0}
.gate .stem{width:2px;flex:1;background:var(--marble-dark);min-height:34px;margin-top:1px}
.gate .body{padding-bottom:20px;flex:1}
.gate .hz{font-size:9.5px;font-weight:700;letter-spacing:.18em;color:var(--champagne-dark);text-transform:uppercase}
.gate .nm{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:19px;margin:3px 0 4px;letter-spacing:-.005em;color:var(--charcoal)}
.gate .ds{font-size:12px;color:var(--mid-grey);line-height:1.45}

.btn{display:block;width:100%;text-align:center;background:var(--w-blue);color:var(--ivory);font-family:'Jost',sans-serif;font-weight:600;border:none;border-radius:14px;padding:14px;font-size:13.5px;cursor:pointer;letter-spacing:.04em;box-shadow:0 6px 16px rgba(8,145,178,.25);text-transform:uppercase}
.btn.mg{background:var(--w-mag);box-shadow:0 6px 16px rgba(190,24,93,.25)}
.btn.br{background:var(--champagne);box-shadow:0 6px 16px rgba(160,120,74,.25)}
.btn.ghost{background:var(--warm-white);border:1px solid var(--marble-dark);color:var(--charcoal);box-shadow:none}
.btn.sm{padding:10px;font-size:11.5px;border-radius:11px}
.btn.xs{display:inline-block;width:auto;padding:6px 11px;font-size:10px;letter-spacing:.1em;border-radius:9px;box-shadow:none}
.strike-strip{background:var(--warm-white);border:1px solid rgba(190,24,93,.15);border-radius:14px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.strike-strip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--w-mag)}
.strike-strip .ss-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--charcoal);flex:1;letter-spacing:-.005em}
.strike-strip .ss-save{font-size:11px;font-weight:600;color:#16A34A;white-space:nowrap;letter-spacing:.02em}
.strike-done{background:#F0FDF4;border:1px solid rgba(22,163,74,.20);border-radius:14px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.strike-done::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#16A34A}
.strike-done .sd-check{font-size:14px;color:#16A34A;flex-shrink:0;font-weight:700}
.strike-done .sd-body{flex:1;min-width:0}
.strike-done .sd-nm{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--charcoal);letter-spacing:-.005em}
.strike-done .sd-lbl{font-size:11px;color:#16A34A;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strike-done .sd-time{font-size:10px;color:var(--mid-grey);white-space:nowrap;letter-spacing:.06em;font-weight:700;flex-shrink:0}
.audit-row{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid var(--marble)}
.audit-row:last-child{border-bottom:none}
.audit-time{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--mid-grey);padding-top:2px;white-space:nowrap;min-width:38px}
.audit-body{flex:1}
.audit-nm{font-weight:600;font-size:13px;color:var(--charcoal)}
.audit-lbl{font-size:11.5px;color:#16A34A;margin-top:2px}

/* ── ROLE SELECTOR (dedicated dark-navy layout) ─────────────────── */
.role-screen{min-height:100%;display:flex;flex-direction:column;background:#0D1B2A;color:rgba(255,255,255,.95);padding:14px 22px 20px;position:relative;overflow:hidden}
.role-sf-watermark{position:absolute;bottom:-20px;right:-10px;font-family:'Cormorant Garamond',serif;font-weight:400;font-size:88px;line-height:1;color:rgba(255,255,255,.045);pointer-events:none;-webkit-user-select:none;user-select:none;white-space:nowrap;letter-spacing:-2px;z-index:0}
.role-hero{position:relative;z-index:1;flex-shrink:0}
.role-brand{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.role-w{width:32px;height:32px;border:1.5px solid #C9A84C;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:#C9A84C;flex-shrink:0;letter-spacing:.02em}
.role-prop{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#C9A84C;font-weight:600}
.role-h1{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:500;line-height:1.04;letter-spacing:-.01em;color:#fff;margin-bottom:12px}
.role-h1 em{font-style:italic;color:#C8A44C;font-weight:400}
.role-sub{font-size:13px;line-height:1.5;color:rgba(255,255,255,.6);max-width:94%}
.role-sub em{font-style:italic;color:rgba(255,255,255,.85);font-weight:400}
.role-cards{position:relative;z-index:1;display:flex;flex-direction:column;gap:14px;margin-top:20px;flex:0 0 auto;justify-content:flex-start}
.role-card{position:relative;text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:18px 18px 16px;cursor:pointer;font-family:'Jost',sans-serif;color:inherit;transition:all .15s;overflow:hidden}
.role-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.role-card.teal::before{background:#0EA5E9}
.role-card.mag::before{background:#C4427A}
.role-card:hover{background:rgba(255,255,255,.07);transform:translateY(-1px)}
.role-card:active{transform:translateY(0)}
.role-arrow{position:absolute;right:18px;top:24px;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:rgba(255,255,255,.35);line-height:1;pointer-events:none}
.role-card.teal .role-arrow{color:rgba(14,165,233,.55)}
.role-card.mag  .role-arrow{color:rgba(196,66,122,.55)}
.role-card-head{display:flex;align-items:center;gap:13px;margin-bottom:8px}
.role-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.role-icon.teal{background:rgba(14,165,233,.14)}
.role-icon.teal svg{stroke:#0EA5E9;fill:none;stroke-width:1.9;width:22px;height:22px}
.role-icon.mag{background:rgba(196,66,122,.14)}
.role-icon.mag svg{stroke:#C4427A;fill:none;stroke-width:1.9;width:22px;height:22px}
.role-card-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:#fff;letter-spacing:-.005em;line-height:1.15;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.role-live{font-family:'Jost',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.18em;background:rgba(14,165,233,.18);color:#0EA5E9;padding:3px 8px;border-radius:5px;text-transform:uppercase}
.role-card-sub{font-size:11.5px;color:rgba(255,255,255,.55);margin:0 0 12px 55px;line-height:1.4}
.role-chips{display:flex;flex-wrap:wrap;gap:6px;margin-left:55px}
.role-chip{font-size:10px;font-weight:500;letter-spacing:.04em;padding:5px 9px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:rgba(255,255,255,.78)}
.role-card.teal .role-chip{border-color:rgba(14,165,233,.22);background:rgba(14,165,233,.06)}
.role-card.mag  .role-chip{border-color:rgba(196,66,122,.22);background:rgba(196,66,122,.06)}
.role-foot{position:relative;z-index:1;text-align:center;font-size:10px;color:rgba(255,255,255,.32);margin-top:auto;padding-top:24px;letter-spacing:.04em}

.voice-btn{display:inline-flex;align-items:center;gap:8px;background:var(--warm-white);border:1px solid var(--marble-dark);color:var(--charcoal);padding:9px 14px;border-radius:11px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;transition:all .15s;letter-spacing:.02em}
.voice-btn:hover{border-color:var(--champagne);background:var(--champagne-pale)}
.voice-btn.on{background:#0891B2;color:#fff;border-color:#0891B2;animation:voicePulse 1.4s ease-in-out infinite}
.voice-btn.on svg{stroke:#fff}
@keyframes voicePulse{0%,100%{box-shadow:0 0 0 0 rgba(8,145,178,.45)}50%{box-shadow:0 0 0 8px rgba(8,145,178,0)}}

/* Press-and-hold voice log (F&B card) */
.vlog-btn{background:transparent;border:1px dashed rgba(255,255,255,.18);border-radius:9px;width:100%;padding:11px;font-family:'Jost',sans-serif;font-size:12px;font-weight:400;color:rgba(245,242,236,.45);display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.vlog-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.6}
.vlog-card{border:1px dashed rgba(255,255,255,.22);border-radius:9px;width:100%;padding:12px 14px;box-sizing:border-box;-webkit-user-select:none;user-select:none}
.vlog-listening{border-color:rgba(212,0,75,.5)}
.vlog-thinking{border-color:rgba(200,164,76,.35);background:rgba(200,164,76,.05);border-style:dashed}
.vlog-think-dots{display:inline-flex;gap:3px;align-items:center}
.vlog-think-dots span{width:4px;height:4px;border-radius:50%;background:rgba(200,164,76,.7);animation:vlogPulse 1s ease-in-out infinite}
.vlog-think-dots span:nth-child(2){animation-delay:.2s}
.vlog-think-dots span:nth-child(3){animation-delay:.4s}
.vlog-answered{border-color:rgba(200,164,76,.3);background:rgba(200,164,76,.05)}
.vlog-answer{font-family:'Jost',sans-serif;font-size:13px;font-weight:400;color:rgba(245,242,236,.85);margin:0 0 6px;line-height:1.5}
.vlog-dismiss{font-family:'Jost',sans-serif;font-size:11px;color:rgba(245,242,236,.32);margin:0;letter-spacing:.08em;font-weight:500}
.vlog-confirmed{border-color:rgba(66,201,126,.5)}
.vlog-error{border-color:rgba(192,57,43,.5);cursor:pointer}
.vlog-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.vlog-label{font-family:'Jost',sans-serif;font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,242,236,.7)}
.vlog-pulse{width:8px;height:8px;border-radius:50%;background:#D4004B;flex-shrink:0;animation:vlogPulse 1s ease-in-out infinite}
@keyframes vlogPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.vlog-transcript{font-size:13px;font-weight:400;color:rgba(245,242,236,.9);margin:6px 0 0;font-style:italic;line-height:1.45}
.vlog-hint{font-size:12px;font-weight:400;color:rgba(245,242,236,.4);margin:4px 0 0;font-style:italic}
.vlog-summary{font-family:'Jost',sans-serif;font-size:14px;font-weight:600;color:#16A34A;margin:4px 0 0;letter-spacing:.04em}
.vlog-summary-line{margin-top:8px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.04em;color:rgba(245,242,236,.7);text-align:center;line-height:1.4}
.gvb{background:var(--warm-white);border-bottom:1px solid var(--marble);padding:10px 16px;position:sticky;top:0;z-index:15;display:flex;align-items:center;gap:12px}
.gvb-mic-btn{width:38px;height:38px;border-radius:50%;background:var(--w-mag);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:transform .15s,background .2s;border:none}
.gvb-mic-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.gvb-listening .gvb-mic-btn{background:var(--w-mag);animation:gvbPulse 1s ease-in-out infinite}
.gvb-thinking .gvb-mic-btn{background:var(--champagne)}
.gvb-confirmed .gvb-mic-btn{background:#16A34A}
.gvb-error .gvb-mic-btn{background:#C04848}
@keyframes gvbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.gvb-text{flex:1;min-width:0}
.gvb-label{font-family:'Jost',sans-serif;font-size:12px;font-weight:600;color:var(--charcoal);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gvb-sublabel{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--mid-grey);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gvb-session{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.gvb-chip{font-family:'Jost',sans-serif;font-size:10px;font-weight:700;background:#C8F0DA;color:#0D6B35;border-radius:5px;padding:2px 8px;letter-spacing:.04em}
.voice-btn svg{width:15px;height:15px;stroke:var(--champagne);fill:none;stroke-width:2;flex-shrink:0}

#nav{position:absolute;left:0;right:0;bottom:0;height:78px;background:rgba(250,248,244,.96);backdrop-filter:blur(14px);border-top:1px solid var(--marble);display:flex;align-items:center;justify-content:space-around;padding:0 6px 14px;z-index:20}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:7px 5px;border:none;background:none;color:var(--mid-grey);font-family:'Jost',sans-serif;flex:1;transition:color .2s}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.9}
.nb span{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.nb.on[data-tab="dashboard"]{color:var(--charcoal)}
.nb.on[data-tab="brief"]{color:var(--w-blue-dark)}
.nb.on[data-tab="fb"]{color:var(--w-mag-dark)}
.nb.on[data-tab="esg"]{color:var(--esg)}
.nb.on[data-tab="portfolio"]{color:var(--champagne-dark)}

.sheet-bg{position:absolute;inset:0;background:rgba(20,20,25,.45);z-index:15;display:flex;align-items:flex-end}
.sheet{background:var(--warm-white);width:100%;border-radius:26px 26px 0 0;padding:22px 20px 30px;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
.sheet .grab{width:40px;height:4px;border-radius:3px;background:var(--marble-dark);margin:0 auto 16px}
.sheet h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;letter-spacing:-.005em;color:var(--charcoal)}
.field{font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--mid-grey);text-transform:uppercase;margin:14px 0 7px}
.opts{display:flex;gap:6px;flex-wrap:wrap}
.opt{padding:9px 12px;border-radius:11px;border:1px solid var(--marble-dark);background:var(--warm-white);font-size:12px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;color:var(--charcoal)}
.opt.on{background:var(--w-mag-pale);border-color:var(--w-mag);color:var(--w-mag-dark)}

/* Strike confirm modal (Mode 1) */
.strike-opt{flex:1;padding:13px 8px;border:1px solid var(--marble-dark);background:var(--warm-white);border-radius:12px;font-family:'Jost',sans-serif;font-size:12.5px;font-weight:600;color:var(--charcoal);cursor:pointer;letter-spacing:.02em;transition:all .15s}
.strike-opt.mini{flex:0 0 50px;font-size:20px;color:var(--mid-grey)}
.strike-opt.on.yes{background:#DCFCE7;border-color:#16A34A;color:#16A34A}
.strike-opt.on.mod{background:#FEF3C7;border-color:#B8962E;color:#7A5A32}
.strike-opt.on.no{background:#FCE7F3;border-color:#BE185D;color:#BE185D}
.heard-line{font-size:11px;color:#16A34A;margin-top:4px;line-height:1.35;font-weight:500}
.disclose-btn{background:none;border:none;font-family:'Jost',sans-serif;font-size:12px;color:#6B7280;cursor:pointer;padding:14px 0 6px;font-weight:600;letter-spacing:.02em;width:100%;text-align:left}
.disclose-panel{background:#F7F4EF;border:1px solid #E5E7EB;border-radius:14px;padding:14px;margin-top:4px}
.disclose-panel .field{margin-top:0}
.disclose-panel .field:not(:first-child){margin-top:14px}

.sub{color:var(--mid-grey);font-size:12.5px;line-height:1.55;margin:0 0 14px}
.row{display:flex;gap:11px}
.muted{color:var(--mid-grey)}.faint{color:var(--mid-grey)}
.blue{color:var(--w-blue-dark)}.mag{color:var(--w-mag-dark)}.gn{color:var(--esg)}.br{color:var(--champagne-dark)}

.silhouette{position:absolute;right:-20px;bottom:-10px;width:140px;height:120px;opacity:.18;pointer-events:none;z-index:0}
.silhouette svg{width:100%;height:100%;fill:var(--champagne-light)}
/* Gap comparison table */
.winn-head{display:grid;grid-template-columns:30% 28% 42%;background:var(--charcoal);padding:10px 14px;gap:8px}
.winn-dim-h{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.65);white-space:nowrap}
.winn-col-a{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.65);white-space:nowrap}
.winn-col-b{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--champagne-light);white-space:nowrap}
.winn-row{display:grid;grid-template-columns:30% 28% 42%;padding:11px 14px;gap:8px;border-top:1px solid var(--marble)}
.winn-row:nth-child(even){background:rgba(237,233,224,.35)}
.winn-dim{font-size:10.5px;font-weight:700;color:var(--charcoal);letter-spacing:.04em;line-height:1.35}

const ROOM_TYPES={standard:{attach:0.72,weight:1.00},premium:{attach:0.78,weight:1.10},marvelous:{attach:0.85,weight:1.25},wow:{attach:0.92,weight:1.45},extreme_wow:{attach:0.95,weight:1.80}};

 tue:{code:'TUE',label:'Tuesday',mixLabel:'Business',story:'Western · Computex week',targetCovers:221,targetSaved:2180,date:'Tue 10 Mar 2026',isWeekend:false,weather:{tempC:17,condition:'rain',icon:'☔',humidity:82},occupancyPct:72,roomsSold:292,guestsPerRoom:1.35,adrNTD:8600,nps:69,seg:{leisure:.25,business:.65,group:.10},mix:{greaterChina:.30,japan:.12,western:.42,korea:.05,seasia:.05,other:.06},earlyCheckIns:42,totalCheckIns:110,suiteRatio:0.09,events:['taipei101_corporate'],segments:{leisure_direct:.05,leisure_ota:.10,business_corp:.45,business_meeting:.25,group_inclusive:.03,group_exclusive:.07,long_stay:.05}},

 sun:{code:'SUN',label:'Sunday',mixLabel:'Leisure',story:'Late peak · families',targetCovers:298,targetSaved:2610,date:'Sun 15 Mar 2026',isWeekend:true,weather:{tempC:25,condition:'sunny',icon:'☀',humidity:64},occupancyPct:74,roomsSold:300,guestsPerRoom:1.66,adrNTD:9600,nps:72,seg:{leisure:.74,business:.16,group:.10},mix:{greaterChina:.40,japan:.20,western:.20,korea:.07,seasia:.08,other:.05},earlyCheckIns:22,totalCheckIns:88,suiteRatio:0.13,events:['taiwan_holiday'],segments:{leisure_direct:.36,leisure_ota:.36,business_corp:.04,business_meeting:.04,group_inclusive:.10,group_exclusive:.02,long_stay:.08}}};
const WEEK_DAYS=['mon','tue','wed','thu','fri','sat','sun'];
const WEEK_TOTAL=WEEK_DAYS.reduce((acc,k)=>({covers:acc.covers+SCEN[k].targetCovers,saved:acc.saved+SCEN[k].targetSaved}),{covers:0,saved:0});

function weatherMultiplier(station,tempC,condition,humidity){
  const HOT=['congee_noodle','japanese','western_hot','korean'];
  const COLD=['fruit_cold','bakery_pastry'];
  let m=1.0;
  if(HOT.includes(station))m=1.0+((22-tempC)*0.018);
  if(COLD.includes(station))m=1.0+((tempC-22)*0.015);
  if(station==='coffee_bar'&&condition==='rain')m*=1.12;
  if(station==='coffee_bar'&&tempC<18)m*=1.08;
  if((humidity||65)>80&&station==='fruit_cold')m*=1.10;
  return Math.max(0.6,Math.min(1.4,m));
}
function earlyArrivalLift(earlyIn,totalIn){return totalIn?1.0+(earlyIn/totalIn*0.15):1.0;}
function learningCorrection(station,history){
  if(!history||history.length<7)return{mult:1.0,conf:0.5};
  const r=history.filter(w=>w.station===station).slice(-14);
  if(r.length<5)return{mult:1.0,conf:0.6};
  const avg=r.reduce((s,w)=>s+(w.waste_kg/w.forecasted),0)/r.length;
  const c=avg>0.15?1.0-(avg-0.15)*0.5:avg<0.05?1.0+(0.05-avg)*0.8:1.0;
  return{mult:Math.max(0.75,Math.min(1.15,c)),conf:Math.min(0.95,0.6+(r.length/28))};
}
function waveSchedule(station,isWeekend,total){
  const isHot=['congee_noodle','japanese','western_hot','korean'].includes(station);
  const isBev=station==='coffee_bar';
  if(isWeekend)return{open_0630:Math.round(total*(isHot?0.30:0.25)),wave_0800:Math.round(total*(isHot?0.40:0.35)),wave_0930:Math.round(total*(isHot?0.30:0.40))};
  return{open_0630:Math.round(total*(isBev?0.40:0.35)),wave_0745:Math.round(total*0.40),wave_0915:Math.round(total*(isBev?0.20:0.25))};
}
function dayOfWeekMultiplier(station,isWeekend){
  if(isWeekend){if(station==='bakery_pastry')return 1.2;if(station==='coffee_bar')return 0.92;}
  else{if(station==='coffee_bar')return 1.15;if(station==='bakery_pastry')return 0.85;}
  return 1.0;
}
function suitePremiumMultiplier(station,suiteRatio){
  return['japanese','dim_sum','western_hot'].includes(station)?1.0+(suiteRatio*0.5):1.0;
}
function historicalAvgWaste(station,history){
  if(!history||!history.length)return BASE_PARS[station]*0.12;
  const r=history.filter(w=>w.station===station).slice(-14);
  return r.length?r.reduce((s,w)=>s+w.waste_kg,0)/r.length:BASE_PARS[station]*0.12;
}
function computeEntitled(s){return s.roomsSold*s.guestsPerRoom*(1+(s.suiteRatio||0.12)*0.3);}
function computeSegmentAttach(segs){
  if(!segs)return 0.65;
  return Object.entries(segs).reduce((sum,[k,w])=>sum+w*(SEGMENT_ATTACH[k]||0.60),0);
}
function computeEventLift(events){
  if(!events||!events.length)return 1.0;
  return events.reduce((m,e)=>m*(1+((EVENT_IMPACT[e]&&EVENT_IMPACT[e].occupancy_lift)||0)),1.0);
}
function explainReason(natMult,weaMult,dayMult,suiteMult,learning,s){
  const lead=s.mix.western>0.35?'Western':(s.mix.greaterChina>0.35?'Greater-China':'Asian');
  const c=[[Math.abs(natMult-1),natMult>1?'more '+lead+' guests':'fewer '+lead+' guests'],
    [Math.abs(weaMult-1),weaMult>1?(s.weather.tempC<18?'cool morning':'warm morning'):'warm → lighter'],
    [Math.abs(dayMult-1),dayMult>1?(s.isWeekend?'weekend indulgence':'weekday coffee rush'):(s.isWeekend?'weekend, less coffee':'weekday, less pastry')],
    [Math.abs(suiteMult-1),'suite-heavy mix → premium stations']];
  c.sort((a,b)=>b[0]-a[0]);
  return c[0][0]<0.03?'on baseline':c[0][1];
}
function gradeColor(v){return v==='A'||v==='A-'?'#0891B2':v==='B+'||v==='B'?'#8C6A14':'#BE185D';}
function buildAction(st){
  const pct=Math.round(Math.abs(st.delta)*100);
  const w2k=st.waves.wave_0800||st.waves.wave_0745||0;
  if(st.delta<0)return{tx:'Trim '+st.label+' −'+pct+'% — '+st.reason,meta:'Open '+st.waves.open_0630+' · exported to Serve 360 format',saving:st.savingNTD};
  return{tx:'Boost '+st.label+' +'+pct+'% — '+st.reason,meta:'Open '+st.waves.open_0630+', then +'+w2k+' in waves',saving:0};
}
// Station waste log: waste_kg / produced_kg per station (yesterday's reading)
const WASTE_CORRECTION={congee_noodle:0.08,dim_sum:0.11,japanese:0.09,korean:0.07,western_hot:0.14,bakery_pastry:0.12,fruit_cold:0.06,taiwanese_local:0.08,coffee_bar:0.05};

function computeBriefingV3(s,history){
  history=history||[];
  const entitled=computeEntitled(s);
  const segAttach=computeSegmentAttach(s.segments);
  const earlyLift=earlyArrivalLift(s.earlyCheckIns||0,s.totalCheckIns||1);
  const eventLift=computeEventLift(s.events);
  const rawCovers=Math.round(entitled*segAttach*earlyLift*eventLift*(s.weather.condition==='rain'?0.97:1.0));
  const covers=s.targetCovers||rawCovers;
  const scale=covers/312;
  const stations=STATIONS.map(st=>{
    let natMult=0,natConf=0;
    for(const nat in s.mix){
      const prior=NAT_PRIORS[nat]&&NAT_PRIORS[nat][st.key];
      if(prior){natMult+=s.mix[nat]*prior.mult;natConf+=s.mix[nat]*prior.conf;}
      else{natMult+=s.mix[nat];natConf+=s.mix[nat]*0.5;}
    }
    const weaMult=weatherMultiplier(st.key,s.weather.tempC,s.weather.condition,s.weather.humidity);
    const dayMult=dayOfWeekMultiplier(st.key,s.isWeekend);
    const suiteMult=suitePremiumMultiplier(st.key,s.suiteRatio||0.12);
    const learning=learningCorrection(st.key,history);
    // Station waste log is the primary feedback signal — 80% of measured waste ratio corrected into forecast
    const wasteRatio=WASTE_CORRECTION[st.key]||0.10;
    const wasteMult=1-wasteRatio*0.8;
    const base=BASE_PARS[st.key]*scale;
    const demand=base*natMult*weaMult*dayMult*suiteMult*wasteMult;
    const total=Math.round(demand);
    const confidence=Math.min(0.95,natConf*0.4+learning.conf*0.4+0.2);
    const waves=waveSchedule(st.key,s.isWeekend,total);
    const wasteLogKg=Math.round(BASE_PARS[st.key]*scale*wasteRatio*10)/10;
    const savingKg=Math.max(0,wasteLogKg-(total*0.05));
    const delta=(demand-base)/base;
    return{...st,total,opening:waves.open_0630,replenish:Math.max(0,total-waves.open_0630),delta,
      reason:explainReason(natMult,weaMult,dayMult,suiteMult,learning,s),
      measuredY:wasteLogKg,wasteRatio,waves,confidence,
      savingNTD:Math.round(savingKg*CPP),co2Avoided:Math.round(savingKg*CO2*10)/10};
  });
  const ranked=[...stations].filter(x=>Math.abs(x.delta)>0.08).sort((a,b)=>Math.abs(b.delta*BASE_PARS[b.key])-Math.abs(a.delta*BASE_PARS[a.key]));
  const actions=ranked.slice(0,3).map(st=>buildAction(st));
  if(actions.length<3)actions.push(s.isWeekend?{tx:'Defer pastry 2nd bake to 08:00',meta:'Later weekend peak 08:30–10:00',saving:0}:{tx:'Open coffee-led at 06:30',meta:'Weekday business rush — grab-and-go up',saving:0});
  if(s.weather.condition==='rain'&&actions.length<4)actions.push({tx:'Hold opening volumes 10 min',meta:'Rain delays arrivals — watch live covers',saving:0});
  const rawSavingNTD=stations.reduce((s,st)=>s+st.savingNTD,0);
  const totalSavingNTD=s.targetSaved||rawSavingNTD;
  const totalCO2=Math.round(stations.reduce((s,st)=>s+st.co2Avoided,0)*10)/10;
  const globalConfidence=stations.reduce((s,st)=>s+st.confidence,0)/stations.length;
  // TODO: Phase 2 — scorecard. Triple-threat A/B/C grades rebuilt once
  // we have 4+ weeks of measured data. Keep the math here, just don't surface
  // it in the UI yet (per 2026-06-04 decision: trend indicators only).
  // const demandV=s.isWeekend?'B+':'A-',wasteV=totalSavingNTD>4000?'A':totalSavingNTD>2500?'B+':'B',speedV=globalConfidence>0.82?'A-':'B+';
  // const demandLbl={A:'±5% forecast accuracy','A-':'±10% forecast accuracy','B+':'±15% forecast accuracy',B:'±20% forecast accuracy',C:'±30% forecast accuracy',D:'>30% error'};

// (see worker/README.md). When unset OR the proxy fails, finishVoiceLog
// transparently falls back to the local keyword parser so the demo still works.
const INTENT_PROXY_URL='https://serviceflow-intent.jeremiegougenheim.workers.dev';
async function resolveVoiceIntent(transcript){
  if(!INTENT_PROXY_URL)throw new Error('proxy-not-configured');
  const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),3500);
  try{
    const r=await fetch(INTENT_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript}),signal:ctrl.signal});
    if(!r.ok)throw new Error('proxy-status-'+r.status);
    return await r.json();
  }finally{clearTimeout(to);}
}

// Voice parser — shared by the modal log sheet and the press-and-hold voice button.
// Returns a structured result; parseVoiceTranscript also writes into logSel for the modal flow.
const VOICE_STATION_MAP=[
  ['western hot','Western Hot'],['dim sum','Dim Sum'],['dimsum','Dim Sum'],
  ['congee noodle','Congee & Noodle'],['coffee bar','Coffee Bar'],
  ['japanese','Japanese'],['yen','Japanese'],['korean','Korean'],
  ['western','Western Hot'],['congee','Congee & Noodle'],['noodle','Congee & Noodle'],
  ['pastry','Bakery & Pastry'],['bakery','Bakery & Pastry'],
  ['fruit','Fruit & Cold'],['cold','Fruit & Cold'],
  ['taiwanese','Taiwanese Local'],['coffee','Coffee Bar']
];
// Pre-normalise spoken word numbers so "two kilos" parses like "2 kilos".
// Browsers transcribe numbers inconsistently — Chrome often writes digits,
// Safari and Edge often spell them out, and Android keyboards can mix both.
const WORD_NUM={zero:'0',half:'0.5','a half':'0.5','one':'1','a':'1','an':'1','two':'2',twin:'2',three:'3',four:'4',five:'5',six:'6',seven:'7',eight:'8',nine:'9',ten:'10'};
function normaliseSpokenNumbers(s){
  let out=' '+s+' ';
  Object.keys(WORD_NUM).sort((a,b)=>b.length-a.length).forEach(k=>{
    out=out.replace(new RegExp('\\b'+k+'\\b','g'),WORD_NUM[k]);
  });
  return out.trim();
}
function parseVoice(text){
  const lower=normaliseSpokenNumbers((text||'').toLowerCase().trim());
  // longest keyword wins (multi-word before single)
  let station=null;
  for(const [k,v] of VOICE_STATION_MAP){if(lower.includes(k)){station=v;break;}}
  let type='Over-prep';
  if(/spoil/.test(lower))type='Spoilage';
  else if(/miss|cover/.test(lower))type='Miss';
  // quantity: kg (default) or grams normalised → kg
  const kgMatch=lower.match(/(\d+(?:\.\d+)?)\s*(?:kg|kilo|kilos)/);
  const gMatch=lower.match(/(\d+(?:\.\d+)?)\s*(?:gram|grams|\bg\b)/);
  const numMatch=!kgMatch&&!gMatch?lower.match(/(\d+(?:\.\d+)?)/):null;
  let amount=null;
  if(kgMatch)amount=parseFloat(kgMatch[1]);
  else if(gMatch)amount=parseFloat(gMatch[1])/1000;
  else if(numMatch)amount=parseFloat(numMatch[1]);
  let destination=null;
  if(/compost/.test(lower))destination='Compost';
  else if(/staff/.test(lower))destination='Staff meal';
  else if(/bin|trash|garbage/.test(lower))destination='Bin';
  const isValid=station!==null&&amount!==null;
  const summary=isValid?(amount+'kg — '+station+(type!=='Over-prep'?' · '+type:' · over-prep')):null;
  return{raw:text,station,type,amount,unit:'kg',destination,isValid,summary};
}
function parseVoiceTranscript(text){
  const r=parseVoice(text);
  if(r.station)logSel.station=r.station;
  logSel.type=r.type;
  if(r.amount!==null&&r.amount>=0&&r.amount<=20)logSel.qty=r.amount;
  if(r.destination)logSel.destination=r.destination;
}

function showLogImpact(station,wasteKg){

function toggleVoiceLog(){
  if(!voiceSupported)return;
  if(voiceLog.phase==='listening'){
    const rec=voiceLogRec;
    if(rec&&rec.state==='recording')rec.stop();  // onstop → finishVoiceLog(blob)
    else{voiceLog.phase='error';voiceLog.error='Nothing recorded';renderVoiceLog();autoResetVoiceLog(3000);}
    return;
  }
  if(voiceLog.phase==='thinking'||voiceLog.phase==='confirmed')return;
  if(voiceLog.phase==='answered'){
    clearTimeout(voiceLogResetTimer);
    voiceLog={phase:'idle',transcript:'',result:null,error:'',strikeFeedback:''};
    renderVoiceLog();return;
  }
  startVoiceLog();
}
function startVoiceLog(){
  clearTimeout(voiceLogSilenceTimer);
  clearTimeout(voiceLogResetTimer);
  if(!voiceSupported){
    voiceLog={phase:'error',transcript:'',result:null,error:'Mic not available — use text input below'};
    renderVoiceLog();autoResetVoiceLog(4000);return;
  }
  voiceLog={phase:'listening',transcript:'Recording…',result:null,error:''};
  renderVoiceLog();
  const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':
                 MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':
                 MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
  const chunks=[];
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    if(voiceLog.phase!=='listening'){stream.getTracks().forEach(t=>t.stop());return;}
    const mr=mimeType?new MediaRecorder(stream,{mimeType}):new MediaRecorder(stream);
    voiceLogRec=mr;
    let chunkSilenceTimer=null;
    mr.ondataavailable=e=>{
      if(e.data&&e.data.size>0){
        chunks.push(e.data);
        clearTimeout(chunkSilenceTimer);
        chunkSilenceTimer=setTimeout(()=>{if(voiceLogRec===mr&&mr.state==='recording')mr.stop();},1500);
      }
    };
    mr.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      voiceLogRec=null;clearTimeout(chunkSilenceTimer);
      const blob=new Blob(chunks,{type:mimeType||'audio/webm'});
      await finishVoiceLog(blob);
    };
    mr.start(250);
    voiceLogSilenceTimer=setTimeout(()=>{
      if(voiceLogRec===mr&&mr.state==='recording')mr.stop();
    },3000);
  }).catch(err=>{
    voiceLog.phase='error';
    voiceLog.error=err.name==='NotAllowedError'?'Mic blocked — allow access in browser settings':'Mic unavailable — use text input';
    renderVoiceLog();autoResetVoiceLog(4000);
  });
}
async function finishVoiceLog(blob){
  clearTimeout(voiceLogSilenceTimer);

  voiceLog.phase='thinking';voiceLog.transcript='Transcribing…';renderVoiceLog();
  if(!blob||!blob.size){
    voiceLog.phase='error';voiceLog.error='Nothing recorded — tap to try again';
    renderVoiceLog();autoResetVoiceLog(4000);return;
  }
  // Step 1 — Whisper transcription
  let text='';
  if(INTENT_PROXY_URL){
    try{
      const res=await fetch(INTENT_PROXY_URL+'/transcribe',{method:'POST',body:blob});
      if(!res.ok)throw new Error('HTTP '+res.status);
      const data=await res.json();
      text=(data.text||'').trim();
    }catch(err){
      console.warn('[ServiceFlow] Whisper failed, falling back to local parser:',err);
      voiceLog.phase='error';voiceLog.error='Transcription failed — use text input';
      renderVoiceLog();autoResetVoiceLog(4000);return;
    }
  }
  if(!text){
    voiceLog.phase='error';voiceLog.error='Nothing heard — tap to try again';
    renderVoiceLog();autoResetVoiceLog(4000);return;
  }
  voiceLog.transcript=text;renderVoiceLog();
  // Step 2 — intent classification
  if(!INTENT_PROXY_URL)return localParseFinish(text);
  let intent=null;
  try{intent=await resolveVoiceIntent(text);}
  catch(err){console.warn('[ServiceFlow] intent proxy failed, falling back to local parser:',err);return localParseFinish(text);}
  routeIntent(intent,text);
}
function routeIntent(intent,text){
  if(!intent||typeof intent.intent!=='string'){return localParseFinish(text);}
  if(intent.intent==='WASTE_LOG'){
    // Map the spoken station name back to our canonical station label.
    const stationKey=String(intent.station||'').toLowerCase();
    let station=null;
    for(const [k,v] of VOICE_STATION_MAP){if(stationKey.includes(k)){station=v;break;}}
    let amount=parseFloat(intent.amount);
    if(intent.unit==='g'&&amount)amount=amount/1000;
    if(station&&amount>0&&amount<=20){
      voiceLogEntries.push({station,type:'Over-prep',amount,unit:'kg',timestamp:new Date().toISOString(),source:'voice',raw:text});
      voiceLog.undoIndex=voiceLogEntries.length-1;
      voiceLog.result={isValid:true,summary:amount+'kg — '+station+' · over-prep'};
      voiceLog.phase='confirmed';renderVoiceLog();updateVoiceSummary();
      autoConfirmStrikeIfMatch(station);
      autoResetVoiceLog(8000);return;
    }
    // Claude said WASTE_LOG but the entities didn't survive normalisation —
    // try the local keyword parser as a second pass before erroring.
    return localParseFinish(text);
  }
  if(intent.intent==='QUESTION'){
    voiceLog.result={isValid:false,reply:intent.reply||"I can log waste — try a station name and amount."};
    voiceLog.phase='answered';renderVoiceLog();autoResetVoiceLog(6000);return;
  }
  if(intent.intent==='CANCEL'){
    clearTimeout(voiceLogResetTimer);
    voiceLog={phase:'idle',transcript:'',result:null,error:'',strikeFeedback:''};renderVoiceLog();return;
  }
  // UNCLEAR (or CONFIRM in isolation, which we treat as guidance)
  voiceLog.phase='error';
  voiceLog.error="Didn't catch that — say station + amount";
  renderVoiceLog();autoResetVoiceLog(4000);
}
function localParseFinish(text){
  const parsed=parseVoice(text);voiceLog.result=parsed;
  if(parsed.isValid){
    voiceLogEntries.push({station:parsed.station,type:parsed.type,amount:parsed.amount,unit:parsed.unit,timestamp:new Date().toISOString(),source:'voice',raw:parsed.raw});
    voiceLog.undoIndex=voiceLogEntries.length-1;
    voiceLog.phase='confirmed';renderVoiceLog();updateVoiceSummary();
    autoConfirmStrikeIfMatch(parsed.station);
    autoResetVoiceLog(8000);
  }else{
    voiceLog.phase='error';
    voiceLog.error="Didn't catch that — say station + amount";
    renderVoiceLog();autoResetVoiceLog(4000);
  }
}
function autoResetVoiceLog(ms){
  clearTimeout(voiceLogResetTimer);
  voiceLogResetTimer=setTimeout(()=>{voiceLog={phase:'idle',transcript:'',result:null,error:'',strikeFeedback:''};renderVoiceLog();},ms);
}
// If the just-logged station has an active pre-emptive strike, auto-confirm it
// so the chef never has to both speak a waste log AND tap CONFIRM & LOG.
function autoConfirmStrikeIfMatch(stationLabel){
  if(!stationLabel)return;
  if(confirmedStrikes.some(c=>c.station===stationLabel))return;
  const s=SCEN[state.scenario],b=computeBriefing(s);
  const allStrikes=[...b.stations].filter(st=>st.delta<-0.02).sort((a,c)=>a.delta-c.delta);
  if(!allStrikes.length)allStrikes.push([...b.stations].sort((a,c)=>a.delta-c.delta)[0]);
  const strike=allStrikes.find(st=>st.label===stationLabel);
  if(!strike)return;
  const pct=Math.round(Math.abs(strike.delta)*100);
  const saving=Math.max(0,Math.round((BASE_PARS[strike.key]*b.scale-strike.total)*CPP));
  const now=new Date(),pad=n=>(''+n).padStart(2,'0');
  confirmedStrikes.push({station:stationLabel,pct,saving,followed:'yes',modPct:pct,
    time:pad(now.getHours())+':'+pad(now.getMinutes()),note:'auto-confirmed via voice log'});
  voiceLog.strikeFeedback='✓ '+stationLabel+' logged · strike confirmed';
  renderGlobalVoiceBar();
  setTimeout(()=>{voiceLog.strikeFeedback='';if(voiceLog.phase==='confirmed')renderGlobalVoiceBar();},2000);
  if(state.tab==='fb'&&state.outlet==='kitchen')render();
}
function toggleVoice(){
  if(!voiceSupported)return;
  if(logSel.listening){if(voiceRec&&voiceRec.state==='recording')voiceRec.stop();return;}
  const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':
                 MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':
                 MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const mr=mimeType?new MediaRecorder(stream,{mimeType}):new MediaRecorder(stream);
    const chunks=[];
    voiceRec=mr;
    mr.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
    mr.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      voiceRec=null;logSel.listening=false;
      if(!chunks.length){openLog();return;}
      const blob=new Blob(chunks,{type:mimeType||'audio/webm'});
      if(INTENT_PROXY_URL){
        try{
          const res=await fetch(INTENT_PROXY_URL+'/transcribe',{method:'POST',body:blob});
          if(res.ok){const data=await res.json();const txt=(data.text||'').trim();if(txt){logSel.transcript=txt;parseVoiceTranscript(txt);}}
        }catch(err){console.warn('[ServiceFlow] modal Whisper failed:',err);}
      }
      openLog();
    };
    mr.start(250);
    logSel.listening=true;openLog();
    setTimeout(()=>{if(voiceRec===mr&&mr.state==='recording')mr.stop();},8000);
  }).catch(err=>{
    logSel.listening=false;
    console.warn('[ServiceFlow] Modal mic failed:',err.name);
    openLog();
  });
}
// ── MODE 1 — Strike Confirm ─────────────────────────────────────
function openStrike(station,recPct,savings){
  strikeSel={station,recPct,savings,followed:null,modPct:recPct,note:''};
  renderStrike();
}
function pickStrike(opt){strikeSel.followed=opt;renderStrike();}
function renderStrike(){
  const ex=g('sheetbg');if(ex)ex.remove();
  const sheet=document.createElement('div');sheet.className='sheet-bg';sheet.id='sheetbg';
  sheet.onclick=e=>{if(e.target===sheet)closeLog()};

     +'<span id="strikeModVal" style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:500;color:#2C3E50;min-width:62px;text-align:right">−'+strikeSel.modPct+'%</span>'
     +'</div>'
    :'';
  const noteBlock=sel==='no'
    ?'<input type="text" placeholder="Why skipped? (optional)" oninput="strikeSel.note=this.value" value="'+(strikeSel.note||'').replace(/"/g,'&quot;')+'" style="width:100%;padding:11px 14px;border:1px solid var(--marble-dark);border-radius:11px;font-family:Jost,sans-serif;font-size:13px;color:var(--charcoal);background:var(--warm-white);margin-top:10px">'
    :'';
  sheet.innerHTML='<div class="sheet"><div class="grab"></div>'
    +'<div style="display:flex;align-items:center;gap:9px;font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#6B7280;margin-bottom:14px">'
    +'<span style="width:8px;height:8px;background:#BE185D;display:inline-block"></span>'+strikeSel.station+' · '+code+' · '+stamp+'</div>'
    +'<div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:500;color:#2C3E50;line-height:1.2;margin-bottom:6px">Recommended: <em style="color:#0891B2;font-style:italic">Trim −'+strikeSel.recPct+'%</em></div>'
    +'<div style="font-size:12.5px;color:#6B7280;margin-bottom:18px">Est. savings: <b style="color:#16A34A;font-weight:600">NT$'+strikeSel.savings.toLocaleString()+'</b></div>'
    +'<div class="field" style="margin-top:0">What did you do?</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:14px">'
    +'<button class="strike-opt'+(sel==='yes'?' on yes':'')+'" onclick="pickStrike(\'yes\')">✓ Followed</button>'
    +'<button class="strike-opt'+(sel==='modified'?' on mod':'')+'" onclick="pickStrike(\'modified\')">Modified</button>'
    +'<button class="strike-opt mini'+(sel==='no'?' on no':'')+'" onclick="pickStrike(\'no\')" title="Skipped">×</button>'
    +'</div>'
    +modBlock+noteBlock
    +'<button class="btn" '+(sel?'':'style="opacity:.35;pointer-events:none;margin-top:18px;background:#0891B2"')+(sel?'style="margin-top:18px;background:#0891B2"':'')+' onclick="submitStrike()">CONFIRM</button>'
    +'<button class="btn ghost sm" style="margin-top:9px" onclick="closeLog()">Cancel</button></div>';
  document.querySelector('.phone').appendChild(sheet);
}
function submitStrike(){
  if(!strikeSel.followed)return;
  const f=strikeSel.followed;
  const pct=f==='modified'?strikeSel.modPct:(f==='no'?0:strikeSel.recPct);
  const sv=f==='no'?0:Math.round(strikeSel.savings*(strikeSel.recPct?pct/strikeSel.recPct:1));
  const now=new Date(),pad=n=>(''+n).padStart(2,'0');
  confirmedStrikes.push({station:strikeSel.station,pct,saving:sv,followed:f,modPct:strikeSel.modPct,time:pad(now.getHours())+':'+pad(now.getMinutes()),note:strikeSel.note||''});
  closeLog();
  render();
}
// ── MODE 2 — Waste Log ─────────────────────────────────────────
function openLog(){
  const types=['Over-prep','Spoilage','Miss'];
  const dests=['Bin','Compost','Staff meal'];
  const ex=g('sheetbg');if(ex)ex.remove();
  const sheet=document.createElement('div');sheet.className='sheet-bg';sheet.id='sheetbg';
  sheet.onclick=e=>{if(e.target===sheet)closeLog()};
  const transcript=logSel.transcript||'';
  const placeholder=voiceSupported?"Say: 'Dim Sum over-prep 2 kg'":"e.g. Dim Sum over-prep 2kg";
  const transcriptLine='<div id="voiceLine" style="font-size:13px;min-height:20px;margin:10px 2px 0;line-height:1.4;'+(transcript?'color:var(--charcoal);font-weight:500':'color:var(--mid-grey);font-style:italic')+'">'+(transcript||placeholder)+'</div>';
  const heard=transcript?'<div class="heard-line">✓ Heard: <b>'+logSel.station+'</b> · '+logSel.type+(logSel.qty>0?' · '+logSel.qty+'kg':'')+'</div>':'';
  const voiceState=logSel.listening?'Listening… tap to stop':'Tap to dictate (EN / 中文)';
  const head=voiceSupported
    ?'<h2>Log — <em style="color:var(--champagne-dark);font-style:italic">voice first</em></h2>'
     +'<p class="sub" style="margin:5px 0 12px">Station + type is enough. Everything else is optional.</p>'
     +'<button class="voice-btn'+(logSel.listening?' on':'')+'" onclick="toggleVoice()" style="width:100%;justify-content:center;padding:13px;font-size:13px">'+I.mic+'<span>'+voiceState+'</span></button>'
     +transcriptLine+heard
    :'<h2>Log — <em style="color:var(--champagne-dark);font-style:italic">quick entry</em></h2>'
     +'<p class="sub" style="margin:5px 0 12px">Same result as voice — type a one-liner or pick below.</p>'
     +'<input type="text" placeholder="'+placeholder+'" oninput="logSel.transcript=this.value;parseVoiceTranscript(this.value);const h=g(\'fbHeard\');if(h)h.innerHTML=this.value?\'✓ Heard: <b>\'+logSel.station+\'</b> · \'+logSel.type+(logSel.qty>0?\' · \'+logSel.qty+\'kg\':\'\'):\'\'" value="'+(transcript).replace(/"/g,'&quot;')+'" style="width:100%;padding:12px 14px;border:1px solid var(--marble-dark);border-radius:11px;font-family:Jost,sans-serif;font-size:13px;color:var(--charcoal);background:var(--warm-white)">'
     +'<div id="fbHeard" class="heard-line" style="min-height:16px">'+(transcript?'✓ Heard: <b>'+logSel.station+'</b> · '+logSel.type+(logSel.qty>0?' · '+logSel.qty+'kg':''):'')+'</div>';
  const discloseToggle='<button class="disclose-btn" onclick="logSel.expanded=!logSel.expanded;openLog()">'+(logSel.expanded?'▴':'▼')+' Add details (optional)</button>';
  const panel=logSel.expanded?'<div class="disclose-panel">'
    +'<div class="field" style="margin-top:0">Quantity</div>'
    +'<div style="display:flex;align-items:center;gap:14px">'
    +'<input type="range" min="0" max="20" step="0.5" value="'+logSel.qty+'" oninput="logSel.qty=parseFloat(this.value);g(\'logQtyVal\').textContent=this.value+\'kg\'" style="flex:1;accent-color:#0891B2">'
    +'<span id="logQtyVal" style="font-family:\'Cormorant Garamond\',serif;font-size:18px;font-weight:500;color:#2C3E50;min-width:56px;text-align:right">'+logSel.qty+'kg</span>'
    +'</div>'
    +'<div class="field">Destination</div><div class="opts">'+dests.map(d=>'<div class="opt '+(logSel.destination===d?'on':'')+'" onclick="logSel.destination=\''+d+'\';openLog()">'+d+'</div>').join('')+'</div>'
    +'<div class="field">Photo</div>'
    +'<label class="btn ghost sm" style="display:block;cursor:pointer;text-align:center;text-transform:none;letter-spacing:0;font-size:13px;padding:11px;margin:0"><input type="file" accept="image/*" capture="environment" onchange="logSel.photo=(this.files[0]||{}).name||null;openLog()" style="display:none">'+(logSel.photo?'✓ '+(logSel.photo.length>22?logSel.photo.substring(0,22)+'…':logSel.photo):'📷 Quick snap')+'</label>'
    +'<div class="field">Note</div>'
    +'<input type="text" placeholder="Optional context" oninput="logSel.note=this.value" value="'+(logSel.note||'').replace(/"/g,'&quot;')+'" style="width:100%;padding:11px 14px;border:1px solid #E5E7EB;border-radius:11px;font-family:Jost,sans-serif;font-size:13px;color:var(--charcoal);background:#fff">'
    +'</div>':'';
  sheet.innerHTML='<div class="sheet"><div class="grab"></div>'+head
    +'<div class="field">Station</div><div class="opts">'+STATIONS.slice(0,6).map(st=>'<div class="opt '+(logSel.station===st.label?'on':'')+'" onclick="logSel.station=\''+st.label+'\';openLog()">'+st.label+'</div>').join('')+'</div>'
    +'<div class="field">Type</div><div class="opts">'+types.map(t=>'<div class="opt '+(logSel.type===t?'on':'')+'" onclick="logSel.type=\''+t+'\';openLog()">'+t+'</div>').join('')+'</div>'
    +discloseToggle+panel
    +'<button class="btn mg" style="margin-top:18px" onclick="submitLog()">Log waste</button>'
    +'<button class="btn ghost sm" style="margin-top:9px" onclick="closeLog()">Cancel</button></div>';
  document.querySelector('.phone').appendChild(sheet);
}
function submitLog(){
  const q=logSel.qty>0?' · '+logSel.qty+'kg':'';
  const co2=logSel.qty>0?' · '+(logSel.qty*2.5).toFixed(1)+'kg CO₂e':'';
  // Add to the session log (same store as voice/text entries) when a qty was set.
  if(logSel.qty>0){
    voiceLogEntries.push({station:logSel.station,type:logSel.type,amount:logSel.qty,unit:'kg',timestamp:new Date().toISOString(),source:'manual',raw:''});
  }
  closeLog();
  updateVoiceSummary();
  toast('✓ Logged · '+logSel.station+' '+logSel.type+q+co2+' · model updates at 18:00','#16A34A');
}
function closeLog(){
  if(voiceRec&&voiceRec.state==='recording'){try{voiceRec.stop();}catch(_){}}
  if(voiceLogRec&&voiceLogRec.state==='recording'){try{voiceLogRec.stop();}catch(_){}}
  voiceLog={phase:'idle',transcript:'',result:null,error:'',strikeFeedback:''};
  logSel.listening=false;logSel.transcript='';logSel.expanded=false;logSel.qty=0;logSel.destination=null;logSel.photo=null;logSel.note='';
  strikeSel={station:'',recPct:0,savings:0,followed:null,modPct:0,note:''};
  const e=g('sheetbg');if(e)e.remove();
}

const TABS=[
  ['dashboard','Home','dash'],
  ['brief','Brief','brief'],
  ['fb','F&B','fb'],
  ['esg','ESG','esg']
  // TODO Phase 2 — re-add ['portfolio','Owner','portfolio'] once owner role ships
];
const SCREEN_BAR={dashboard:'dk',brief:'bl',fb:'mg',esg:'gn',portfolio:'br',cadence:'dk',notifs:'dk',gap:'dk'};
function renderNav(){
  const navEl=g('nav');
  if(!state.role||state.role==='owner'){navEl.style.display='none';return;}
  navEl.style.display='flex';
  navEl.innerHTML=TABS.map(([id,lb,ic])=>'<button class="nb '+(state.tab===id?'on':'')+'" data-tab="'+id+'" data-go="'+id+'" onclick="go(\''+id+'\')">'+I[ic]+'<span>'+lb+'</span></button>').join('');
}
function setSbar(){
  const s=g('sbar');if(!s)return;
  const cls=!state.role?'role':(state.role==='owner'?'br':(SCREEN_BAR[state.tab]||'dk'));
  s.className='sbar '+cls;
  const btn=g('backRoleBtn');
  if(!state.role){btn.style.display='none';return;}
  btn.style.display='';
  btn.textContent=state.tab==='dashboard'?'‹ ROLE':'‹ HOME';
}
function backFromTopbar(){
  if(state.tab&&state.tab!=='dashboard'){state.tab='dashboard';render();return;}
  state.role=null;render();
}
function render(){
  let html;
  // No role guard exists here — all tabs (including brief) are available to all roles.
  try{
    if(!state.role)html=screenRole();
    else if(state.role==='owner')html=screenPortfolio();
    else html=({dashboard:screenDashboard,brief:screenBrief,fb:screenFB,esg:screenEsg,portfolio:screenPortfolio,cadence:screenCadence,notifs:screenNotifs,gap:screenGap}[state.tab]||screenDashboard)();
  }catch(e){console.error('render screen threw:',e);html='<div class="body" style="padding:20px"><p style="color:#C04848;font-size:13px">'+e.message+'</p></div>';}
  const screenEl=g('screen');
  screenEl.innerHTML=html;screenEl.scrollTop=0;
  // role selector has no bottom nav, so drop the reserved bottom padding
  screenEl.style.paddingBottom=state.role?'120px':'0';
  renderNav();setSbar();updateVoiceSummary();renderGlobalVoiceBar();
}
function pick(r){
  state.role=r;
  if(r==='owner')state.tab='portfolio';
  else if(r==='chef')state.tab='fb';
  else state.tab='dashboard';
  closeLog();render();
}
function go(t){closeLog();state.tab=t;render();}
function setSc(sc){state.scenario=sc;state.strikeIndex=0;confirmedStrikes=[];state.actionsOpen=false;render();}
function setOutlet(o){state.outlet=o;render();}
function shareBrief(){if(navigator.share){navigator.share({title:'Morning Brief · ServiceFlow',text:'ServiceFlow Morning Brief for W Taipei — '+new Date().toLocaleDateString(),url:'https://service-flow.dev'});}else{navigator.clipboard&&navigator.clipboard.writeText('https://service-flow.dev');toast('Link copied to clipboard','#0891B2');}}
function toast(msg,color){const t=document.createElement('div');t.textContent=msg;
  t.style.cssText='position:absolute;left:50%;bottom:110px;transform:translateX(-50%);background:'+color+';color:#fff;font-weight:600;padding:13px 19px;border-radius:13px;font-size:12.5px;letter-spacing:.04em;z-index:30;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:88%;text-align:center;font-family:Jost,sans-serif';
  document.querySelector('.phone').appendChild(t);setTimeout(()=>t.remove(),2200);}
function confirmToast(){toast('✓ Logged · Exported to Serve 360 format & Taiwan FSC','#16A34A');}
function shareToast(){toast('⤓ Prep sheet sent to kitchen + GM','#0891B2');}

// Safety net: delegated click on #screen for any [data-go] target. Inline
// onclicks in innerHTML-rendered nodes are reliable in modern Safari, but
// iOS occasionally drops them under low-memory churn — this catches both.
document.addEventListener('click',function(e){
  const t=e.target.closest('[data-go]');
  if(t&&typeof go==='function'){go(t.getAttribute('data-go'));}
});

(function tick(){const d=new Date(),pad=n=>(''+n).padStart(2,'0');const el=g('clock');if(el)el.textContent=pad(d.getHours())+':'+pad(d.getMinutes());setTimeout(tick,15000);})();

(function bootLoader(){const fill=g('ldFill'),pct=g('ldPct');let p=0;const t=setInterval(()=>{p+=Math.random()*9+6;if(p>=100){p=100;clearInterval(t);setTimeout(()=>{g('loader').classList.add('hide');render();setTimeout(()=>{const l=g('loader');if(l)l.remove();},900);},250);}fill.style.width=p+'%';pct.textContent=Math.round(p)+'%';},140);})();
