<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>ServiceFlow · W Taipei</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Palette v8 — slate/teal/white per brief Fix #3.
     Champagne retained as legacy W-Hotels accent (brief silent on it). */
  --champagne:#A0784A; --champagne-light:#C9A97A; --champagne-dark:#7A5A32; --champagne-pale:#F0E8DA;
  --bronze:#A0784A; --bronze-light:#C9A97A; --bronze-dark:#7A5A32; --bronze-pale:#F0E8DA;
  --ivory:#FFFFFF; --warm-white:#FFFFFF; --marble:#F7F4EF; --marble-dark:#E5E7EB;
  --charcoal:#2C3E50; --mid-grey:#6B7280; --light-grey:#9CA3AF;
  --blue:#0891B2; --blue-dark:#0E7490; --blue-pale:#CFFAFE;
  --w-blue:#0891B2; --w-blue-dark:#0E7490; --w-blue-pale:#CFFAFE;
  --mag:#BE185D; --w-mag:#BE185D; --w-mag-dark:#9F174A; --w-mag-pale:#FCE7F3;
  --esg:#16A34A; --esg-pale:#DCFCE7; --amber:#B9770F; --amber-pale:#FBF1E2; --red-alert:#BE185D;
  --green:#15803D; --green-pale:#DCFCE7;
  --shadow:0 8px 32px rgba(44,62,80,0.10); --shadow-sm:0 2px 10px rgba(44,62,80,0.07);
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{
  background:#0F1B2A;font-family:'Jost',-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background-image:radial-gradient(ellipse at 20% 80%,rgba(8,145,178,.16) 0%,transparent 50%),
                   radial-gradient(ellipse at 80% 20%,rgba(190,24,93,.10) 0%,transparent 45%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--charcoal);
}
.phone{
  width:390px;height:844px;background:var(--marble);border-radius:48px;overflow:hidden;
  position:relative;flex-shrink:0;font-size:14px;display:flex;flex-direction:column;
  box-shadow:0 48px 120px rgba(0,0,0,.6),0 0 0 1px rgba(8,145,178,.18);
}
@media(max-width:440px){body{padding:0}.phone{width:100vw;height:100vh;border-radius:0;box-shadow:none}}

#loader{position:absolute;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--charcoal) 0%,#1F2937 60%,#0F1B2A 100%);transition:opacity .9s ease;overflow:hidden}
#loader.hide{opacity:0;pointer-events:none}
.ld-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,169,122,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,122,.04) 1px,transparent 1px);background-size:44px 44px}
.ld-glow{position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(8,145,178,.10) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
.ld-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;text-align:center;padding:0 30px}
.ld-mark{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--ivory)}
.ld-rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--champagne-light),transparent);margin:14px auto 10px;animation:ruleIn .7s ease .4s forwards}
@keyframes ruleIn{to{width:110px}}
.ld-sub{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,169,122,.75)}
.ld-bar-wrap{width:220px;height:2px;background:rgba(201,169,122,.12);border-radius:2px;overflow:hidden;margin-top:44px}
.ld-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--champagne-dark),var(--champagne-light),#E8D090);background-size:200% 100%;animation:shimmer 1.8s linear infinite;box-shadow:0 0 10px rgba(201,169,122,.4);transition:width .25s ease;width:0}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.ld-pct{margin-top:12px;font-size:13px;color:var(--champagne-light);font-family:monospace;letter-spacing:.14em}
.ld-foot{position:absolute;bottom:28px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.50);text-align:center;width:100%;padding:0 20px}

.sbar{height:44px;padding:0 12px 0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:5;color:var(--ivory)}
.sbar.dk{background:var(--charcoal)}
.sbar.bl{background:var(--w-blue-dark)}
.sbar.mg{background:var(--w-mag-dark)}
.sbar.gn{background:#1B3725}
.sbar.br{background:var(--champagne-dark)}
.stime{font-weight:600;font-size:14px;letter-spacing:.02em}
.sicons{display:flex;align-items:center;gap:8px;opacity:.85}
.sicons .sig{display:flex;gap:2px;align-items:flex-end}
.sicons .sig span{width:3px;height:3px;border-radius:50%;background:currentColor}
.sicons .sig span:nth-child(2){height:4px}.sicons .sig span:nth-child(3){height:5px}
.sicons .bat svg{display:block}
.back-role{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--champagne-light);background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-weight:600;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;transition:background .15s}
.back-role:hover{background:rgba(245,240,232,.06)}

#screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:120px}
#screen::-webkit-scrollbar{display:none}

.hero{padding:16px 20px 22px;position:relative;overflow:hidden;color:var(--ivory);margin-bottom:18px}
.hero.dk{background:linear-gradient(170deg,var(--charcoal) 0%,#1F2937 100%)}
.hero.bl{background:linear-gradient(170deg,var(--w-blue-dark) 0%,var(--w-blue) 100%)}
.hero.mg{background:linear-gradient(170deg,var(--w-mag-dark) 0%,var(--w-mag) 100%)}
.hero.gn{background:linear-gradient(170deg,#1B3725 0%,var(--esg) 100%)}
.hero.br{background:linear-gradient(170deg,var(--champagne-dark) 0%,var(--champagne) 100%)}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent 0,transparent 44px,rgba(201,169,122,.05) 44px,rgba(201,169,122,.05) 45px);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--champagne),var(--champagne-light),var(--champagne),transparent);opacity:.55}

.brand-row{position:relative;z-index:1;display:flex;align-items:center;gap:11px;margin-bottom:14px}
.w-mono{width:30px;height:30px;border:1px solid var(--champagne);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--champagne-light);flex-shrink:0}
.brand-name{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,240,232,.88);font-weight:600;flex:1}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(8,145,178,.12);border:1px solid rgba(8,145,178,.32);padding:4px 9px;border-radius:18px;font-size:11px;color:var(--w-blue);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.live-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--w-blue);animation:pulse 2s infinite;box-shadow:0 0 6px rgba(8,145,178,.6)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.hero h1{position:relative;z-index:1;font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;line-height:1.05;margin:8px 0 8px;letter-spacing:-.005em;color:var(--ivory)}
.hero h1 em{font-style:italic;color:var(--champagne-light);font-weight:400}
.hero-sub{position:relative;z-index:1;font-size:12.5px;line-height:1.55;color:rgba(245,240,232,.7);max-width:94%}

.meta-line{position:relative;z-index:1;display:flex;gap:7px;align-items:center;font-size:13px;color:rgba(245,240,232,.65);font-weight:400;margin-top:10px;font-family:'Jost',sans-serif;flex-wrap:wrap}
.meta-line .sep{width:3px;height:3px;border-radius:50%;background:rgba(245,240,232,.4);flex-shrink:0}

.body{padding:0 20px}
.sec-h{display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px}
.sec-h h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--charcoal);letter-spacing:-.005em}
.sec-h .sa{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--champagne-dark);background:none;border:none;font-weight:600;cursor:pointer;font-family:'Jost',sans-serif}
.divider{height:1px;margin:4px 0 12px;background:linear-gradient(90deg,transparent,var(--marble-dark),transparent)}
.eyebrow{display:flex;align-items:center;gap:9px;font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--mid-grey);font-weight:600;margin-bottom:10px}
.eyebrow::before{content:'';display:inline-block;width:6px;height:6px;background:var(--champagne)}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:14px;padding:13px;box-shadow:0 2px 10px rgba(20,20,30,.07)}
.kpi .k{font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mid-grey)}
.kpi .v{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;color:var(--charcoal);line-height:1.05;margin-top:5px;letter-spacing:-.01em}
.kpi .v small{font-family:'Jost',sans-serif;font-size:12px;font-weight:500;color:var(--mid-grey);letter-spacing:.02em;margin:0 2px}
.kpi .v.blue{color:var(--w-blue-dark)}.kpi .v.mag{color:var(--w-mag-dark)}.kpi .v.gn{color:var(--esg)}.kpi .v.br{color:var(--champagne-dark)}
.kpi .d{font-size:11px;color:var(--mid-grey);margin-top:4px;line-height:1.3}

.score{display:flex;gap:7px}
.score .g{flex:1;text-align:center;background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:13px;padding:11px 5px;box-shadow:var(--shadow-sm)}
.score .v{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;line-height:1;letter-spacing:-.01em;color:var(--charcoal)}
.score .k{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mid-grey);margin-top:5px}
.score .glabel{font-size:10px;color:#6B7280;font-weight:600;margin-top:4px;line-height:1.3;padding:0 2px;letter-spacing:.01em}
.score .gcrit{font-size:9px;color:var(--mid-grey);margin-top:3px;line-height:1.35;padding:0 2px;opacity:.78}

.log-cta-wrap{position:sticky;bottom:0;z-index:5;padding:10px 0 14px;background:linear-gradient(to top,var(--marble) 0%,var(--marble) 70%,rgba(247,244,239,0) 100%);margin:4px -2px 0}
.log-cta{width:100%;min-height:48px;background:#0891B2;color:#fff;border:none;border-radius:16px;padding:12px 18px;font-family:'Jost',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 18px rgba(8,145,178,.28)}
.log-cta:active{background:#0E7490}

.ab-box{background:var(--charcoal);border-radius:18px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;color:var(--ivory);box-shadow:var(--shadow)}
.ab-box::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent 0,transparent 44px,rgba(201,169,122,.04) 44px,rgba(201,169,122,.04) 45px);pointer-events:none}
.ab-eb{position:relative;z-index:1;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--champagne-light);font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ab-eb::before{content:'';display:inline-block;width:6px;height:6px;background:var(--champagne-light)}
.ab-h{position:relative;z-index:1;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--ivory);line-height:1.2;margin-bottom:14px;letter-spacing:-.005em}
.ab-h em{font-style:italic;color:var(--champagne-light);font-weight:400}
.ab-item{position:relative;z-index:1;display:flex;gap:13px;padding:11px 0;border-bottom:1px solid rgba(201,169,122,.08);align-items:flex-start}
.ab-item:last-of-type{border-bottom:none}
.ab-ring{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--champagne);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:500;color:var(--champagne-light);flex-shrink:0;margin-top:1px}
.ab-body{flex:1}
.ab-tx{font-size:13.5px;line-height:1.45;color:var(--ivory);font-weight:500}
.ab-meta{font-size:11.5px;color:rgba(245,240,232,.55);margin-top:4px;line-height:1.4}
.ab-save{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:#7AB67A;text-align:right;flex-shrink:0;align-self:center;letter-spacing:-.005em;min-width:78px}
.ab-save.zero{color:rgba(245,240,232,.65);font-size:14px}
.ab-recap{position:relative;z-index:1;margin-top:14px;padding-top:14px;border-top:1px solid rgba(201,169,122,.2);display:flex;justify-content:space-between;align-items:baseline}
.ab-recap-l{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,240,232,.6);font-weight:600}
.ab-recap-v{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--champagne-light);letter-spacing:-.005em}

.st-row{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow-sm)}
.st-badge{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:60px}
.st-body{flex:1;min-width:0}
.st-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--charcoal);letter-spacing:-.005em;line-height:1.1}
.st-prep{font-size:12.5px;color:var(--charcoal);margin-top:5px;line-height:1.4;font-weight:500}
.st-prep b{color:var(--w-blue-dark);font-weight:600;font-family:'Cormorant Garamond',serif;font-size:14px}
.st-cause{font-size:11.5px;color:var(--mid-grey);margin-top:4px;line-height:1.4}
.st-waste{font-size:10.5px;color:var(--mid-grey);margin-top:6px;letter-spacing:.04em}
.st-pct{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--charcoal);letter-spacing:-.01em;flex-shrink:0;align-self:center;min-width:54px;text-align:right}
.st-pct.up{color:var(--esg)}.st-pct.down{color:var(--w-mag-dark)}.st-pct.flat{color:var(--mid-grey)}

.esg-card{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:16px;padding:14px 16px;margin-bottom:13px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.esg-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--esg),var(--champagne));border-radius:16px 0 0 16px}
.esg-card .ico{width:38px;height:38px;border-radius:11px;background:rgba(74,143,94,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.esg-card .ico svg{width:19px;height:19px;stroke:var(--esg);fill:none;stroke-width:1.9}
.esg-card .esg-body{flex:1}
.esg-card .esg-h{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--champagne-dark);font-weight:700}
.esg-card .esg-t{font-size:13px;font-weight:600;color:var(--charcoal);margin-top:3px;line-height:1.35}
.esg-card .esg-m{font-size:11.5px;color:var(--mid-grey);margin-top:3px;line-height:1.4}

.day-toggle{display:flex;background:#E5E7EB;border-radius:22px;padding:3px;gap:0;margin-bottom:16px}
.day-toggle button{flex:1;padding:9px 14px;border:none;background:none;border-radius:18px;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.06em;color:var(--mid-grey);cursor:pointer;font-weight:500;transition:all .18s}
.day-toggle button.on{background:var(--w-blue);color:#fff;box-shadow:0 2px 8px rgba(8,145,178,.3);font-weight:600}

.card{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:18px;padding:16px 18px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
.card.flat{box-shadow:none;background:var(--marble);border-color:var(--marble-dark)}

.rolecard{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:18px;padding:18px;margin-bottom:11px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);transition:transform .12s;position:relative;overflow:hidden}
.rolecard::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent 0,transparent 44px,rgba(160,120,74,.04) 44px,rgba(160,120,74,.04) 45px);pointer-events:none}
.rolecard:active{transform:scale(.985)}
.rolecard .ico{width:48px;height:48px;border-radius:13px;background:var(--w-blue-pale);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.rolecard .ico svg{width:24px;height:24px;stroke:var(--w-blue-dark);fill:none;stroke-width:1.9}
.rolecard.mg .ico{background:var(--w-mag-pale)}.rolecard.mg .ico svg{stroke:var(--w-mag-dark)}
.rolecard.br .ico{background:var(--champagne-pale)}.rolecard.br .ico svg{stroke:var(--champagne-dark)}
.rolecard .t{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:18px;color:var(--charcoal);position:relative;z-index:1;letter-spacing:-.005em;line-height:1.15}
.rolecard .d{font-size:11.5px;color:var(--mid-grey);margin-top:3px;position:relative;z-index:1}
.badge{display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.18em;padding:3px 8px;border-radius:6px;background:var(--esg-pale);color:var(--esg);vertical-align:middle;text-transform:uppercase;margin-left:6px}

.dash-tile{background:var(--warm-white);border:1px solid var(--marble-dark);border-radius:16px;padding:14px 15px;margin-bottom:10px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s}
.dash-tile:active{transform:scale(.985)}
.dash-i{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dash-i svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9}
.dash-b{flex:1;min-width:0}
.dash-t{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--charcoal);letter-spacing:-.005em;line-height:1.12}
.dash-d{font-size:11.5px;color:var(--mid-grey);margin-top:4px;line-height:1.4}
.dash-arrow{font-size:22px;color:var(--champagne);flex-shrink:0;font-family:'Cormorant Garamond',serif;font-weight:400}

.otabs{display:flex;background:var(--warm-white);border-bottom:1px solid var(--marble);overflow-x:auto;scrollbar-width:none;margin:0 -20px 14px;padding:0 16px}
.otabs::-webkit-scrollbar{display:none}
.otab{padding:11px 13px;font-size:11.5px;letter-spacing:.04em;font-family:'Jost',sans-serif;font-weight:500;cursor:pointer;border:none;background:none;color:var(--mid-grey);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .2s}
.otab.on{color:var(--w-mag-dark);border-bottom-color:var(--w-mag)}

.strike{background:linear-gradient(170deg,#1F2937 0%,var(--charcoal) 100%);color:var(--ivory);border-radius:20px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid rgba(190,24,93,.25)}
.strike::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(108deg,transparent 0,transparent 44px,rgba(201,169,122,.04) 44px,rgba(201,169,122,.04) 45px);pointer-events:none}
.strike::after{content:'';position:absolute;top:-80px;right:-80px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(190,24,93,.2) 0%,transparent 70%);pointer-events:none}
.strike .st-eb{position:relative;z-index:1;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--w-mag);font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:10px}
.strike .st-eb::before{content:'';display:inline-block;width:6px;height:6px;background:var(--w-mag)}

<script>
const STATIONS=[
 {key:'congee_noodle',label:'Congee & Noodle'},{key:'dim_sum',label:'Dim Sum'},
 {key:'japanese',label:'Japanese'},{key:'korean',label:'Korean'},
 {key:'western_hot',label:'Western Hot'},{key:'bakery_pastry',label:'Bakery & Pastry'},
 {key:'fruit_cold',label:'Fruit & Cold'},{key:'taiwanese_local',label:'Taiwanese Local'},
 {key:'coffee_bar',label:'Coffee Bar'}];
const BASE_PARS={congee_noodle:60,dim_sum:40,japanese:45,korean:25,western_hot:70,bakery_pastry:55,fruit_cold:80,taiwanese_local:35,coffee_bar:300};
const STATION_BADGE={congee_noodle:'#16A34A',dim_sum:'#9F174A',japanese:'#C9A97A',korean:'#BE185D',western_hot:'#7A5A32',bakery_pastry:'#B9770F',fruit_cold:'#0891B2',taiwanese_local:'#A0784A',coffee_bar:'#2C3E50'};
const NAT_PRIORS={greaterChina:{congee_noodle:{mult:1.55,conf:0.92},dim_sum:{mult:1.50,conf:0.95},taiwanese_local:{mult:1.35,conf:0.88},western_hot:{mult:0.75,conf:0.85},bakery_pastry:{mult:0.85,conf:0.78},coffee_bar:{mult:0.90,conf:0.80}},japan:{japanese:{mult:1.85,conf:0.94},fruit_cold:{mult:1.25,conf:0.82},coffee_bar:{mult:1.10,conf:0.75},western_hot:{mult:0.75,conf:0.80}},korea:{korean:{mult:1.85,conf:0.91},congee_noodle:{mult:1.15,conf:0.70},coffee_bar:{mult:1.20,conf:0.78}},western:{western_hot:{mult:1.65,conf:0.93},bakery_pastry:{mult:1.45,conf:0.90},coffee_bar:{mult:1.40,conf:0.95},fruit_cold:{mult:1.15,conf:0.82},congee_noodle:{mult:0.65,conf:0.88},dim_sum:{mult:0.60,conf:0.85}},seasia:{congee_noodle:{mult:1.25,conf:0.75},fruit_cold:{mult:1.35,conf:0.80},western_hot:{mult:0.90,conf:0.65}},other:{}};
const P={leisure:.70,business:.50,group:.60}, CPP=45, CO2=0.35;
const ROOM_TYPES={standard:{attach:0.72,weight:1.00},premium:{attach:0.78,weight:1.10},marvelous:{attach:0.85,weight:1.25},wow:{attach:0.92,weight:1.45},extreme_wow:{attach:0.95,weight:1.80}};
const SEGMENT_ATTACH={leisure_direct:0.74,leisure_ota:0.58,business_corp:0.52,business_meeting:0.71,group_inclusive:0.94,group_exclusive:0.45,long_stay:0.65};
const EVENT_IMPACT={taipei101_corporate:{occupancy_lift:0.05},computex_week:{occupancy_lift:0.12},cny_golden_week:{occupancy_lift:0.08},japan_golden_week:{occupancy_lift:0.06},taiwan_holiday:{occupancy_lift:0.03}};
const SCEN={
 sat:{label:'Saturday',date:'Sat 14 Mar 2026',isWeekend:true,weather:{tempC:24,condition:'sunny',icon:'☀',humidity:65},occupancyPct:78,roomsSold:316,guestsPerRoom:1.6,adrNTD:9800,nps:71,seg:{leisure:.7,business:.2,group:.1},mix:{greaterChina:.41,japan:.22,western:.18,korea:.07,seasia:.07,other:.05},earlyCheckIns:28,totalCheckIns:94,suiteRatio:0.14,events:['taiwan_holiday'],segments:{leisure_direct:.35,leisure_ota:.35,business_corp:.05,business_meeting:.05,group_inclusive:.08,group_exclusive:.02,long_stay:.10}},
 tue:{label:'Tuesday',date:'Tue 17 Mar 2026',isWeekend:false,weather:{tempC:17,condition:'rain',icon:'☔',humidity:82},occupancyPct:72,roomsSold:292,guestsPerRoom:1.35,adrNTD:8600,nps:69,seg:{leisure:.25,business:.65,group:.1},mix:{greaterChina:.30,japan:.12,western:.42,korea:.05,seasia:.05,other:.06},earlyCheckIns:42,totalCheckIns:110,suiteRatio:0.09,events:['taipei101_corporate'],segments:{leisure_direct:.05,leisure_ota:.10,business_corp:.45,business_meeting:.25,group_inclusive:.03,group_exclusive:.07,long_stay:.05}}};

function weatherMultiplier(station,tempC,condition,humidity){
  const HOT=['congee_noodle','japanese','western_hot','korean'];
  const COLD=['fruit_cold','bakery_pastry'];
  let m=1.0;
  if(HOT.includes(station))m=1.0+((22-tempC)*0.018);
  if(COLD.includes(station))m=1.0+((tempC-22)*0.015);
  if(station==='coffee_bar'&&condition==='rain')m*=1.12;
  if(station==='coffee_bar'&&tempC<18)m*=1.08;
  if((humidity||65)>80&&station==='fruit_cold')m*=1.10;
  return Math.max(0.6,Math.min(1.4,m));
}
function earlyArrivalLift(earlyIn,totalIn){return totalIn?1.0+(earlyIn/totalIn*0.15):1.0;}
function learningCorrection(station,history){
  if(!history||history.length<7)return{mult:1.0,conf:0.5};
  const r=history.filter(w=>w.station===station).slice(-14);
  if(r.length<5)return{mult:1.0,conf:0.6};
  const avg=r.reduce((s,w)=>s+(w.waste_kg/w.forecasted),0)/r.length;
  const c=avg>0.15?1.0-(avg-0.15)*0.5:avg<0.05?1.0+(0.05-avg)*0.8:1.0;
  return{mult:Math.max(0.75,Math.min(1.15,c)),conf:Math.min(0.95,0.6+(r.length/28))};
}
function waveSchedule(station,isWeekend,total){
  const isHot=['congee_noodle','japanese','western_hot','korean'].includes(station);
  const isBev=station==='coffee_bar';
  if(isWeekend)return{open_0630:Math.round(total*(isHot?0.30:0.25)),wave_0800:Math.round(total*(isHot?0.40:0.35)),wave_0930:Math.round(total*(isHot?0.30:0.40))};
  return{open_0630:Math.round(total*(isBev?0.40:0.35)),wave_0745:Math.round(total*0.40),wave_0915:Math.round(total*(isBev?0.20:0.25))};
}
function dayOfWeekMultiplier(station,isWeekend){
  if(isWeekend){if(station==='bakery_pastry')return 1.2;if(station==='coffee_bar')return 0.92;}
  else{if(station==='coffee_bar')return 1.15;if(station==='bakery_pastry')return 0.85;}
  return 1.0;
}
function suitePremiumMultiplier(station,suiteRatio){
  return['japanese','dim_sum','western_hot'].includes(station)?1.0+(suiteRatio*0.5):1.0;
}
function historicalAvgWaste(station,history){
  if(!history||!history.length)return BASE_PARS[station]*0.12;
  const r=history.filter(w=>w.station===station).slice(-14);
  return r.length?r.reduce((s,w)=>s+w.waste_kg,0)/r.length:BASE_PARS[station]*0.12;
}
function computeEntitled(s){return s.roomsSold*s.guestsPerRoom*(1+(s.suiteRatio||0.12)*0.3);}
function computeSegmentAttach(segs){
  if(!segs)return 0.65;
  return Object.entries(segs).reduce((sum,[k,w])=>sum+w*(SEGMENT_ATTACH[k]||0.60),0);
}
function computeEventLift(events){
  if(!events||!events.length)return 1.0;
  return events.reduce((m,e)=>m*(1+((EVENT_IMPACT[e]&&EVENT_IMPACT[e].occupancy_lift)||0)),1.0);
}
function explainReason(natMult,weaMult,dayMult,suiteMult,learning,s){
  const lead=s.mix.western>0.35?'Western':(s.mix.greaterChina>0.35?'Greater-China':'Asian');
  const c=[[Math.abs(natMult-1),natMult>1?'more '+lead+' guests':'fewer '+lead+' guests'],
    [Math.abs(weaMult-1),weaMult>1?(s.weather.tempC<18?'cool morning':'warm morning'):'warm → lighter'],
    [Math.abs(dayMult-1),dayMult>1?(s.isWeekend?'weekend indulgence':'weekday coffee rush'):(s.isWeekend?'weekend, less coffee':'weekday, less pastry')],
    [Math.abs(suiteMult-1),'suite-heavy mix → premium stations']];
  c.sort((a,b)=>b[0]-a[0]);
  return c[0][0]<0.03?'on baseline':c[0][1];
}
function gradeColor(v){return v==='A'||v==='A-'?'#0891B2':v==='B+'||v==='B'?'#8C6A14':'#BE185D';}
function buildAction(st){
  const pct=Math.round(Math.abs(st.delta)*100);
  const w2k=st.waves.wave_0800||st.waves.wave_0745||0;
  if(st.delta<0)return{tx:'Trim '+st.label+' −'+pct+'% — '+st.reason,meta:'Open '+st.waves.open_0630+' · exported to Serve 360 format',saving:st.savingNTD};
  return{tx:'Boost '+st.label+' +'+pct+'% — '+st.reason,meta:'Open '+st.waves.open_0630+', then +'+w2k+' in waves',saving:0};
}
// Station waste log: waste_kg / produced_kg per station (yesterday's reading)
const WASTE_CORRECTION={congee_noodle:0.08,dim_sum:0.11,japanese:0.09,korean:0.07,western_hot:0.14,bakery_pastry:0.12,fruit_cold:0.06,taiwanese_local:0.08,coffee_bar:0.05};

function computeBriefingV3(s,history){
  history=history||[];
  const entitled=computeEntitled(s);
  const segAttach=computeSegmentAttach(s.segments);
  const earlyLift=earlyArrivalLift(s.earlyCheckIns||0,s.totalCheckIns||1);
  const eventLift=computeEventLift(s.events);
  const covers=Math.round(entitled*segAttach*earlyLift*eventLift*(s.weather.condition==='rain'?0.97:1.0));
  const scale=covers/312;
  const stations=STATIONS.map(st=>{
    let natMult=0,natConf=0;
    for(const nat in s.mix){
      const prior=NAT_PRIORS[nat]&&NAT_PRIORS[nat][st.key];
      if(prior){natMult+=s.mix[nat]*prior.mult;natConf+=s.mix[nat]*prior.conf;}
      else{natMult+=s.mix[nat];natConf+=s.mix[nat]*0.5;}
    }
    const weaMult=weatherMultiplier(st.key,s.weather.tempC,s.weather.condition,s.weather.humidity);
    const dayMult=dayOfWeekMultiplier(st.key,s.isWeekend);
    const suiteMult=suitePremiumMultiplier(st.key,s.suiteRatio||0.12);
    const learning=learningCorrection(st.key,history);
    // Station waste log is the primary feedback signal — 80% of measured waste ratio corrected into forecast
    const wasteRatio=WASTE_CORRECTION[st.key]||0.10;
    const wasteMult=1-wasteRatio*0.8;
    const base=BASE_PARS[st.key]*scale;
    const demand=base*natMult*weaMult*dayMult*suiteMult*wasteMult;
    const total=Math.round(demand);
    const confidence=Math.min(0.95,natConf*0.4+learning.conf*0.4+0.2);
    const waves=waveSchedule(st.key,s.isWeekend,total);
    const wasteLogKg=Math.round(BASE_PARS[st.key]*scale*wasteRatio*10)/10;
    const savingKg=Math.max(0,wasteLogKg-(total*0.05));
    const delta=(demand-base)/base;
    return{...st,total,opening:waves.open_0630,replenish:Math.max(0,total-waves.open_0630),delta,
      reason:explainReason(natMult,weaMult,dayMult,suiteMult,learning,s),
      measuredY:wasteLogKg,wasteRatio,waves,confidence,
      savingNTD:Math.round(savingKg*CPP),co2Avoided:Math.round(savingKg*CO2*10)/10};
  });
  const ranked=[...stations].filter(x=>Math.abs(x.delta)>0.08).sort((a,b)=>Math.abs(b.delta*BASE_PARS[b.key])-Math.abs(a.delta*BASE_PARS[a.key]));
  const actions=ranked.slice(0,3).map(st=>buildAction(st));
  if(actions.length<3)actions.push(s.isWeekend?{tx:'Defer pastry 2nd bake to 08:00',meta:'Later weekend peak 08:30–10:00',saving:0}:{tx:'Open coffee-led at 06:30',meta:'Weekday business rush — grab-and-go up',saving:0});
  if(s.weather.condition==='rain'&&actions.length<4)actions.push({tx:'Hold opening volumes 10 min',meta:'Rain delays arrivals — watch live covers',saving:0});
  const totalSavingNTD=stations.reduce((s,st)=>s+st.savingNTD,0);
  const totalCO2=Math.round(stations.reduce((s,st)=>s+st.co2Avoided,0)*10)/10;
  const globalConfidence=stations.reduce((s,st)=>s+st.confidence,0)/stations.length;
  const demandV=s.isWeekend?'B+':'A-',wasteV=totalSavingNTD>4000?'A':totalSavingNTD>2500?'B+':'B',speedV=globalConfidence>0.82?'A-':'B+';
  const demandLbl={A:'±5% forecast accuracy','A-':'±10% forecast accuracy','B+':'±15% forecast accuracy',B:'±20% forecast accuracy',C:'±30% forecast accuracy',D:'>30% error'};
  const wasteLbl={A:'40%+ waste reduction','A-':'30%+ waste reduction','B+':'20%+ waste reduction',B:'10%+ waste reduction',C:'5%+ waste reduction',D:'<5% reduction'};
  const speedLbl={A:'Log in under 4 min','A-':'Log in under 6 min','B+':'Log in under 8 min',B:'Log in under 12 min',C:'Log in under 20 min',D:'>20 min'};
  const grades={Demand:{v:demandV,label:demandLbl[demandV],c:s.isWeekend?'leisure mix · wave 2 heavy':'business attach · wave 1 sharp'},Waste:{v:wasteV,label:wasteLbl[wasteV],c:totalSavingNTD>4000?'strong cut · NT$'+totalSavingNTD.toLocaleString():totalSavingNTD>2500?'on track · trim 2 stations':'watch over-prep'},Speed:{v:speedV,label:speedLbl[speedV],c:globalConfidence>0.82?'high confidence · fast setup':'moderate · double-check pars'}};
  return{covers,scale,stations,actions,grades,save:totalSavingNTD,co2:totalCO2,
    totalSavingNTD,totalCO2,globalConfidence,
    cooks:Math.max(2,Math.round(covers/50)),servers:Math.max(2,Math.round(covers/(s.isWeekend?16:20))),
    openTime:s.isWeekend?'06:30 · peak 08:30–10:00':'06:30 · peak 07:00–08:30',
    waveTime:s.isWeekend?'08:00':'07:45'};
}
function computeBriefing(s){return computeBriefingV3(s,[]);}

(function tick(){const d=new Date(),pad=n=>(''+n).padStart(2,'0');const el=g('clock');if(el)el.textContent=pad(d.getHours())+':'+pad(d.getMinutes());setTimeout(tick,15000);})();

(function bootLoader(){const fill=g('ldFill'),pct=g('ldPct');let p=0;const t=setInterval(()=>{p+=Math.random()*9+6;if(p>=100){p=100;clearInterval(t);setTimeout(()=>{g('loader').classList.add('hide');render();setTimeout(()=>{const l=g('loader');if(l)l.remove();},900);},250);}fill.style.width=p+'%';pct.textContent=Math.round(p)+'%';},140);})();
