<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ServiceFlow · W Taipei</title>
<style>
  :root{
    --bg:#F4F4F1; --card:#FFFFFF; --ink:#191920; --muted:#6E6E78; --faint:#9A9AA2;
    --line:#EAEAE4; --line2:#F0F0EC;
    --blue:#1488CC; --blue-bright:#16A6EC; --blue-bg:#E9F4FB;
    --mag:#CE1A7E; --mag-bg:#FBE9F3;
    --green:#1C9B72; --green-bg:#E7F5EF; --amber:#B9770F; --amber-bg:#FBF1E2; --red:#CF2E54;
    --shadow:0 1px 2px rgba(20,20,30,.05), 0 10px 26px rgba(20,20,30,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#E7E7E2;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  #phone{width:392px;height:850px;max-height:96vh;background:var(--bg);border-radius:44px;
    border:1px solid #d8d8d2;box-shadow:0 40px 90px rgba(0,0,0,.28);overflow:hidden;position:relative;display:flex;flex-direction:column}
  @media(max-width:440px){body{padding:0}#phone{width:100vw;height:100vh;max-height:none;border-radius:0;border:none;box-shadow:none}}
  .statusbar{height:46px;flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;font-size:13px;font-weight:600;color:var(--ink)}
  .statusbar .w{font-weight:800;letter-spacing:1px;font-size:14px}
  #screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 18px 110px}
  #screen::-webkit-scrollbar{width:0}
  h1{font-size:26px;font-weight:800;letter-spacing:-.6px;margin:10px 0 3px;line-height:1.1}
  h2{font-size:18px;font-weight:800;letter-spacing:-.3px;margin:0}
  .eyebrow{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:800;letter-spacing:1.6px;
    color:var(--faint);text-transform:uppercase;margin:8px 0}
  .eyebrow .sq{width:10px;height:10px;background:var(--blue-bright);border-radius:2px}
  .sub{color:var(--muted);font-size:13.5px;line-height:1.5;margin:0 0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:13px;box-shadow:var(--shadow)}
  .card.flat{box-shadow:none;background:#FBFBF9}
  .row{display:flex;gap:11px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .blue{color:var(--blue)} .mag{color:var(--mag)} .green{color:var(--green)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);
    border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--ink)}
  .btn{display:block;width:100%;text-align:center;background:var(--blue-bright);color:#fff;font-weight:700;
    border:none;border-radius:14px;padding:15px;font-size:14.5px;cursor:pointer;letter-spacing:.2px;box-shadow:0 6px 16px rgba(22,166,236,.25)}
  .btn.mag{background:var(--mag);box-shadow:0 6px 16px rgba(206,26,126,.22)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);box-shadow:none}
  .btn.sm{padding:11px;font-size:13px;border-radius:11px}
  .grade{flex:1;text-align:center}
  .grade .v{font-size:22px;font-weight:800;line-height:1}
  .grade .k{font-size:9.5px;font-weight:700;letter-spacing:.6px;color:var(--faint);text-transform:uppercase;margin-top:6px}
  .delta{font-weight:700;font-size:12px;padding:3px 9px;border-radius:8px;white-space:nowrap}
  .delta.up{color:var(--green);background:var(--green-bg)}
  .delta.down{color:var(--mag);background:var(--mag-bg)}
  .delta.flat{color:var(--muted);background:var(--line2)}
  .prow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line2)}
  .prow:last-child{border-bottom:none}
  .prow .nm{font-weight:700;font-size:14px}
  .prow .rs{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35;max-width:180px}
  .prow .pr{text-align:right}
  .prow .pr b{font-size:19px;font-weight:800}
  .prow .pr small{font-size:11px;color:var(--faint);display:block;margin-top:2px}
  .toggle{display:flex;background:#EDEDE8;border-radius:13px;padding:4px;gap:4px;margin-bottom:15px}
  .toggle button{flex:1;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13px;
    padding:11px;border-radius:10px;cursor:pointer}
  .toggle button.on{background:#fff;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.08)}
  .tile{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)}
  .tile .k{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--faint);text-transform:uppercase}
  .tile .v{font-size:24px;font-weight:800;margin-top:6px;letter-spacing:-.6px}
  .tile .v small{font-size:12.5px;font-weight:700;color:var(--muted)}
  .action{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line2)}
  .action:last-child{border-bottom:none}
  .action .n{width:24px;height:24px;border-radius:8px;background:var(--blue-bg);flex:0 0 24px;display:flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--blue);margin-top:1px}
  .action .tx{font-size:13.5px;line-height:1.4;font-weight:600}
  .action .meta{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.35}
  .rolecard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:13px;cursor:pointer;
    display:flex;align-items:center;gap:15px;box-shadow:var(--shadow);transition:transform .1s}
  .rolecard:active{transform:scale(.985)}
  .rolecard .ico{width:46px;height:46px;border-radius:13px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;flex:0 0 46px}
  .rolecard .ico svg{width:23px;height:23px;stroke:var(--blue);fill:none;stroke-width:1.9}
  .rolecard.mag .ico{background:var(--mag-bg)} .rolecard.mag .ico svg{stroke:var(--mag)}
  .rolecard .t{font-weight:800;font-size:15.5px}
  .rolecard .d{font-size:12px;color:var(--muted);margin-top:3px}
  .badge{font-size:9px;font-weight:800;letter-spacing:.8px;padding:3px 8px;border-radius:6px;background:var(--green-bg);color:var(--green);vertical-align:middle}
  .bar{height:8px;border-radius:6px;background:var(--line2);overflow:hidden}
  .bar > span{display:block;height:100%;border-radius:6px}
  .gate{display:flex;gap:14px}
  .gate .line{display:flex;flex-direction:column;align-items:center;flex:0 0 16px}
  .gate .node{width:15px;height:15px;border-radius:50%;border:3px solid var(--card);box-shadow:0 0 0 1px var(--line);flex:0 0 15px}
  .gate .stem{width:2px;flex:1;background:var(--line);min-height:34px}
  .gate .body{padding-bottom:20px}
  .gate .hz{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--faint)}
  .gate .nm{font-weight:800;font-size:14.5px;margin:2px 0 4px}
  .gate .ds{font-size:12.5px;color:var(--muted);line-height:1.4}
  #nav{position:absolute;left:0;right:0;bottom:0;height:80px;background:rgba(255,255,255,.94);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding-bottom:10px}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--faint);cursor:pointer;flex:1;font-weight:700}
  .nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9}
  .nav-item.active{color:var(--blue)}
  #fab{position:absolute;right:20px;bottom:96px;width:56px;height:56px;border-radius:50%;background:var(--mag);
    box-shadow:0 10px 24px rgba(206,26,126,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:6}
  #fab svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.2}
  .sheet-bg{position:absolute;inset:0;background:rgba(20,20,25,.4);z-index:8;display:flex;align-items:flex-end}
  .sheet{background:var(--card);width:100%;border-radius:26px 26px 0 0;padding:22px 20px 30px;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
  .sheet .grab{width:40px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 16px}
  .field{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;margin:14px 0 7px}
  .opts{display:flex;gap:7px;flex-wrap:wrap}
  .opt{padding:9px 13px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
  .opt.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
  .mic{display:flex;align-items:center;gap:12px;background:var(--mag-bg);border:1px dashed var(--mag);border-radius:14px;padding:14px;margin-bottom:6px}
  .mic .d{width:38px;height:38px;border-radius:50%;background:var(--mag);display:flex;align-items:center;justify-content:center;flex:0 0 38px}
  .mic svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
</style>
<link rel="stylesheet" href="w-theme-dark.css">
</head>
<body>
<div id="phone">
  <div class="statusbar"><span id="clock">06:42</span><span class="w">W&nbsp;TAIPEI</span><span>100%</span></div>
  <div id="screen"></div>
  <div id="fab" onclick="openLog()" style="display:none"></div>
  <div id="nav"></div>
</div>
<script>
/* ===================== BRAIN (v2 logic) ===================== */
const STATIONS=[
 {key:'congee_noodle',label:'Congee & Noodle'},{key:'dim_sum',label:'Dim Sum'},
 {key:'japanese',label:'Japanese'},{key:'korean',label:'Korean'},
 {key:'western_hot',label:'Western Hot'},{key:'bakery_pastry',label:'Bakery & Pastry'},
 {key:'fruit_cold',label:'Fruit & Cold'},{key:'taiwanese_local',label:'Taiwanese Local'},
 {key:'coffee_bar',label:'Coffee Bar'}];
const BASE_PARS={congee_noodle:60,dim_sum:40,japanese:45,korean:25,western_hot:70,bakery_pastry:55,fruit_cold:80,taiwanese_local:35,coffee_bar:300};
const NAT_PRIORS={greaterChina:{congee_noodle:1.5,dim_sum:1.5,taiwanese_local:1.3,western_hot:.8},japan:{japanese:1.8,fruit_cold:1.2,western_hot:.8},korea:{korean:1.8,congee_noodle:1.1},western:{western_hot:1.6,bakery_pastry:1.4,coffee_bar:1.3,congee_noodle:.7},seasia:{congee_noodle:1.2,fruit_cold:1.3},other:{}};
const P={leisure:.70,business:.50,group:.60}, CPP=45, CO2=0.35;
const SCEN={
 sat:{label:'Saturday',isWeekend:true,weather:{tempC:24,condition:'sunny',icon:'\u2600'},occupancyPct:78,roomsSold:304,guestsPerRoom:1.6,adrNTD:9800,nps:71,seg:{leisure:.7,business:.2,group:.1},mix:{greaterChina:.41,japan:.22,western:.18,korea:.07,seasia:.07,other:.05}},
 tue:{label:'Tuesday',isWeekend:false,weather:{tempC:17,condition:'rain',icon:'\u2614'},occupancyPct:72,roomsSold:281,guestsPerRoom:1.35,adrNTD:8600,nps:69,seg:{leisure:.25,business:.65,group:.1},mix:{greaterChina:.30,japan:.12,western:.42,korea:.05,seasia:.05,other:.06}}};

function mixLead(s){return s.mix.western>0.35?'Western':(s.mix.greaterChina>0.35?'Greater-China':'Asian');}
function reasonText(nM,wM,dM,s){
  const cands=[[nM-1,nM>1?'more '+mixLead(s)+' guests':'fewer '+mixLead(s)+' guests'],
    [wM-1,wM>1?(s.weather.tempC<18?'cool morning':'warm morning'):'warm \u2192 lighter'],
    [dM-1,dM>1?(s.isWeekend?'weekend indulgence':'weekday coffee rush'):(s.isWeekend?'weekend, less coffee':'weekday, less pastry')]];
  cands.sort((a,b)=>Math.abs(b[0])-Math.abs(a[0]));
  return Math.abs(cands[0][0])<0.04?'on baseline':cands[0][1];
}
function computeBriefing(s){
  const entitled=s.roomsSold*s.guestsPerRoom;
  const part=s.seg.leisure*P.leisure+s.seg.business*P.business+s.seg.group*P.group;
  const covers=Math.round(entitled*part*(s.weather.condition==='rain'?0.98:1));
  const scale=covers/312, hot=s.weather.tempC>28, cool=s.weather.tempC<18;
  const wm=k=>{if(hot){if(k==='fruit_cold')return 1.15;if(k==='congee_noodle')return .9}if(cool){if(['congee_noodle','japanese','western_hot'].includes(k))return 1.1}return 1};
  const dm=k=>{if(s.isWeekend){if(k==='bakery_pastry')return 1.2;if(k==='coffee_bar')return .92}else{if(k==='coffee_bar')return 1.15;if(k==='bakery_pastry')return .85}return 1};
  const nmf=k=>{let m=0;for(const n in s.mix){const w=(NAT_PRIORS[n]&&NAT_PRIORS[n][k])||1;m+=s.mix[n]*w}return m};
  const of=s.isWeekend?0.25:0.30; let save=0,co2=0;
  const stations=STATIONS.map(st=>{
    const base=BASE_PARS[st.key]*scale, nM=nmf(st.key), wM=wm(st.key), dM=dm(st.key);
    const demand=base*nM*wM*dM, delta=(demand-base)/base, total=Math.round(demand), opening=Math.round(demand*of);
    const measuredY=Math.round(base*0.12);
    if(st.key!=='coffee_bar'){const rec=base*0.15;save+=rec*CPP;co2+=rec*CO2}
    return {...st,total,opening,replenish:Math.max(0,total-opening),delta,reason:reasonText(nM,wM,dM,s),measuredY};
  });
  const ranked=[...stations].filter(x=>Math.abs(x.delta)>0.08).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  const actions=[];
  ranked.slice(0,3).forEach(x=>{const pct=Math.round(Math.abs(x.delta)*100);
    if(x.delta<0)actions.push({tx:`Trim ${x.label} \u2212${pct}% \u00b7 ${x.reason}`,meta:`open ${x.opening} \u00b7 est. NT$${(Math.round(BASE_PARS[x.key]*scale-x.total)*CPP).toLocaleString()} saved \u00b7 Serve 360 auto-logged`});
    else actions.push({tx:`Boost ${x.label} +${pct}% \u00b7 ${x.reason}`,meta:`open ${x.opening}, then ${x.replenish} replenished in waves`});});
  actions.push(s.isWeekend?{tx:'Defer pastry 2nd bake to 08:00',meta:'later weekend peak (08:30\u201310:00)'}:{tx:'Open coffee-led at 06:30',meta:'weekday business rush, grab-and-go up'});
  if(s.weather.condition==='rain')actions.push({tx:'Hold opening volumes ~10 min',meta:'rain delays arrivals; watch live covers'});
  save=Math.round(save); co2=Math.round(co2*10)/10;
  const grades={Demand:s.isWeekend?'B+':'A-',Waste:save>4000?'A':save>2500?'B+':'B',Labour:'A-',ESG:'A'};
  return {covers,scale,stations,actions,grades,save,co2,
    cooks:Math.max(2,Math.round(covers/50)),servers:Math.max(2,Math.round(covers/(s.isWeekend?16:20))),
    openTime:s.isWeekend?'06:30 \u00b7 peak 08:30\u201310:00':'06:30 \u00b7 peak 07:00\u201308:30'};
}

/* ===================== STATE + ICONS ===================== */
let state={role:null,scenario:'sat',tab:'home'};
const g=id=>document.getElementById(id);
const I={
 owner:'<svg viewBox="0 0 24 24"><path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6"/></svg>',
 gm:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>',
 chef:'<svg viewBox="0 0 24 24"><path d="M7 21h10M6 12a4 4 0 010-8 4 4 0 017-2 4 4 0 014 6 4 4 0 01-2 4z"/><path d="M7 12v9M17 12v9"/></svg>',
 pin:'<svg viewBox="0 0 24 24"><path d="M12 22s7-7 7-12a7 7 0 10-14 0c0 5 7 12 7 12z"/><circle cx="12" cy="10" r="2.5"/></svg>',
 home:'<svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>',
 brief:'<svg viewBox="0 0 24 24"><path d="M5 3h14v18l-7-4-7 4z"/></svg>',
 bfast:'<svg viewBox="0 0 24 24"><path d="M4 8h13a4 4 0 010 8h-1M4 8v8a4 4 0 004 4h5a4 4 0 004-4M6 4v2M9 4v2M12 4v2"/></svg>',
 waste:'<svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2M6 7l1 13h10l1-13"/></svg>',
 esg:'<svg viewBox="0 0 24 24"><path d="M12 22c5-3 8-7 8-12V5l-8-3-8 3v5c0 5 3 9 8 12z"/><path d="M9 12l2 2 4-4"/></svg>',
 mic:'<svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0M12 18v3"/></svg>',
 plus:'<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>'};

/* ===================== SCREENS ===================== */
function screenRole(){return `
  <div class="eyebrow" style="margin-top:20px"><span class="sq"></span> SERVICEFLOW \u00b7 OPERATING LAYER</div>
  <h1>The Breakfast Brain.</h1>
  <p class="sub">An operating layer for W Taipei \u2014 choose a vantage point.</p>
  <div class="rolecard" onclick="pick('owner')"><div class="ico">${I.owner}</div><div><div class="t">Owner / VP Regional</div><div class="d">Portfolio \u00b7 asset value \u00b7 ESG</div></div></div>
  <div class="rolecard" onclick="pick('gm')"><div class="ico">${I.gm}</div><div><div class="t">General Manager \u2014 W Taipei <span class="badge">LIVE</span></div><div class="d">All modules \u00b7 the Breakfast Brain</div></div></div>
  <div class="rolecard mag" onclick="pick('gm')"><div class="ico">${I.chef}</div><div><div class="t">Chef / F&amp;B \u2014 the kitchen table</div><div class="d">Breakfast operations</div></div></div>
  <div class="rolecard" style="opacity:.6" onclick="pick('gm')"><div class="ico">${I.pin}</div><div><div class="t">Future W / Marriott property</div><div class="d">Regional expansion \u00b7 coming</div></div></div>
  <p class="sub" style="text-align:center;font-size:11px;margin-top:18px">Concept prototype \u00b7 SparkEdge Digital \u00b7 figures illustrative</p>`;}

function kpis(s,b){return `
  <div class="row" style="margin-bottom:11px">
    <div class="tile"><div class="k">Occupancy</div><div class="v">${s.occupancyPct}<small>%</small></div></div>
    <div class="tile"><div class="k">Covers fcst</div><div class="v">${b.covers}</div></div></div>
  <div class="row" style="margin-bottom:14px">
    <div class="tile"><div class="k">ADR</div><div class="v"><small>NT$</small>${(s.adrNTD/1000).toFixed(1)}k</div></div>
    <div class="tile"><div class="k">NPS</div><div class="v">${s.nps}</div></div></div>`;}

function screenHome(){const s=SCEN[state.scenario],b=computeBriefing(s);const served=Math.round(b.covers*0.42);
  return `
  <div class="eyebrow" style="margin-top:14px"><span class="sq"></span> GOOD MORNING \u00b7 W TAIPEI</div>
  <h1>${s.label} outlook</h1>
  <p class="sub">${s.occupancyPct}% occupancy \u00b7 ${b.covers} breakfast covers forecast \u00b7 ${s.weather.icon} ${s.weather.tempC}\u00b0</p>
  ${kpis(s,b)}
  <div class="card" style="border-color:var(--blue);cursor:pointer" onclick="go('brief')">
    <div class="eyebrow"><span class="sq"></span> READY \u00b7 TAP TO OPEN</div>
    <h2>Nightly Breakfast Briefing</h2>
    <p class="sub" style="margin:6px 0 0">9 stations \u00b7 ${b.actions.length} priority actions \u00b7 ${b.cooks} cooks / ${b.servers} servers</p></div>
  <div class="card">
    <div class="eyebrow"><span class="sq"></span> LIVE \u00b7 ACTUAL vs FORECAST</div>
    <div class="row" style="justify-content:space-between;align-items:baseline"><h2 style="font-size:16px">${served} served</h2><span class="muted" style="font-size:12px">of ${b.covers} forecast \u00b7 08:10</span></div>
    <div class="bar" style="margin-top:10px"><span style="width:42%;background:var(--blue-bright)"></span></div>
    <p class="sub" style="margin:9px 0 0;font-size:12px">Tracking +3% to plan \u2014 congee replenishing on schedule.</p></div>
  <div class="row" style="margin-bottom:13px">
    <div class="tile" style="cursor:pointer" onclick="go('bfast')"><div class="k">the kitchen table</div><div class="v" style="font-size:15px;margin-top:8px">Prep \u2192</div></div>
    <div class="tile" style="cursor:pointer" onclick="go('waste')"><div class="k">Waste loop</div><div class="v green" style="font-size:15px;margin-top:8px">\u221228% \u2192</div></div></div>
  <div class="row">
    <div class="tile" style="cursor:pointer" onclick="go('cadence')"><div class="k">Rolling forecast</div><div class="v" style="font-size:15px;margin-top:8px">5 gates \u2192</div></div>
    <div class="tile" style="cursor:pointer" onclick="go('esg')"><div class="k">ESG</div><div class="v" style="font-size:15px;margin-top:8px">Serve 360 \u2192</div></div></div>`;}

function chips(s){return `<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:15px">
  <span class="chip">${s.weather.icon} ${s.weather.tempC}\u00b0</span>
  <span class="chip">${s.occupancyPct}% occ</span>
  <span class="chip">${Math.round((s.mix.greaterChina+s.mix.japan)*100)}% CN/JP \u00b7 ${Math.round(s.mix.western*100)}% West</span>
  <span class="chip">${s.isWeekend?'Weekend \u00b7 leisure':'Weekday \u00b7 business'}</span></div>`;}

function screenBrief(){const s=SCEN[state.scenario],b=computeBriefing(s);
  const grades=Object.entries(b.grades).map(([k,v])=>{const c=v[0]==='A'?'green':v[0]==='B'?'blue':'amber';
    return `<div class="grade"><div class="v ${c}">${v}</div><div class="k">${k}</div></div>`;}).join('');
  const acts=b.actions.map((a,i)=>`<div class="action"><div class="n">${i+1}</div><div><div class="tx">${a.tx}</div><div class="meta">${a.meta}</div></div></div>`).join('');
  const rows=b.stations.map(st=>{const cls=st.delta>0.05?'up':st.delta<-0.05?'down':'flat';const sg=st.delta>0?'+':'';
    return `<div class="prow"><div><div class="nm">${st.label}</div><div class="rs">${st.reason} \u00b7 ${st.measuredY}kg wasted yest.</div></div>
      <div style="display:flex;align-items:center;gap:11px"><span class="delta ${cls}">${sg}${Math.round(st.delta*100)}%</span>
      <div class="pr"><b>${st.opening}</b><small>+${st.replenish} waves</small></div></div></div>`;}).join('');
  return `
  <div class="eyebrow" style="margin-top:14px"><span class="sq"></span> NIGHTLY BREAKFAST BRIEFING</div>
  <h1>${s.label} \u00b7 ${b.covers} covers</h1>
  <p class="sub">A base cover forecast (occupancy \u00b7 segment \u00b7 inclusion), refined by four live signals.</p>
  <div class="toggle"><button class="${state.scenario==='sat'?'on':''}" onclick="setSc('sat')">Saturday \u00b7 leisure</button><button class="${state.scenario==='tue'?'on':''}" onclick="setSc('tue')">Tuesday \u00b7 business</button></div>
  ${chips(s)}
  <div class="card"><div class="row">${grades}</div></div>
  <div class="card"><div class="eyebrow"><span class="sq"></span> PRIORITY ACTIONS</div>${acts}</div>
  <div class="card"><div class="eyebrow"><span class="sq"></span> PREP SHEET \u00b7 OPENING PAR + REPLENISHMENT</div>${rows}
    <button class="btn ghost sm" style="margin-top:14px" onclick="shareToast()">\u2913  Share / print prep sheet</button></div>
  <div class="card flat"><div class="row" style="justify-content:space-between">
    <div><div class="eyebrow" style="margin:0"><span class="sq"></span> OPEN TIMES</div><div style="font-weight:700;font-size:13px;margin-top:7px">${b.openTime}</div></div>
    <div style="text-align:right"><div class="faint" style="font-size:10px;font-weight:700;letter-spacing:.6px">STAFFING</div><div style="font-weight:700;font-size:13px;margin-top:7px">${b.cooks} cooks \u00b7 ${b.servers} servers</div></div></div></div>
  <div class="card" style="border-color:var(--mag)"><div style="font-size:13.5px;line-height:1.5"><b class="mag">ESG captured \u2014</b> est. <b>NT$${b.save.toLocaleString()}</b> over-prep avoided \u00b7 <b>${b.co2}kg CO\u2082e</b> \u2193 \u00b7 auto-logged to Marriott Serve 360 + Taiwan FSC.</div></div>`;}

function screenBfast(){const s=SCEN[state.scenario],b=computeBriefing(s);
  const strike=[...b.stations].sort((a,c)=>a.delta-c.delta)[0];const pct=Math.round(Math.abs(strike.delta)*100);
  const cards=b.stations.slice(0,6).map(st=>{const cls=st.delta>0.05?'up':st.delta<-0.05?'down':'flat';const sg=st.delta>0?'+':'';
    return `<div class="card" style="margin-bottom:11px;padding:15px 18px"><div class="row" style="justify-content:space-between;align-items:center">
      <div><div class="nm" style="font-weight:800;font-size:14.5px">${st.label}</div><div class="rs" style="margin-top:3px">${st.reason}</div></div>
      <div style="text-align:right"><div style="font-weight:800;font-size:20px">${st.total}</div><span class="delta ${cls}">${sg}${Math.round(st.delta*100)}%</span></div></div></div>`;}).join('');
  return `
  <div class="eyebrow" style="margin-top:14px"><span class="sq"></span> THE KITCHEN TABLE \u00b7 BREAKFAST</div>
  <h1>Station prep</h1>
  <p class="sub">${s.label} \u00b7 ${b.covers} covers \u00b7 opening pars, replenished in waves.</p>
  <div class="card" style="border-color:var(--mag);background:linear-gradient(180deg,#fff,#fdf4f9)">
    <div class="eyebrow"><span class="sq" style="background:var(--mag)"></span> PRE-EMPTIVE STRIKE</div>
    <div style="font-size:15px;font-weight:800;line-height:1.35;margin-bottom:10px">Trim ${strike.label} \u2212${pct}% &amp; hold a fast-replenish buffer</div>
    ${chips(s)}
    <button class="btn mag" onclick="confirmToast()">Confirm &amp; log</button></div>
  ${cards}`;}

function screenWaste(){const s=SCEN[state.scenario],b=computeBriefing(s);
  const sorted=[...b.stations].filter(x=>x.key!=='coffee_bar').sort((a,c)=>c.measuredY-a.measuredY);
  const max=sorted[0].measuredY, reasons=['Over-prep','Expiry','Over-portion'];
  const rows=sorted.slice(0,6).map((st,i)=>`<div style="margin-bottom:14px">
    <div class="row" style="justify-content:space-between;font-size:13px"><span class="nm">${st.label}</span><span class="muted"><b style="color:var(--ink)">${st.measuredY}kg</b> \u00b7 ${reasons[i%3]}</span></div>
    <div class="bar" style="margin-top:7px"><span style="width:${Math.round(st.measuredY/max*100)}%;background:${i===0?'var(--mag)':'var(--blue-bright)'}"></span></div></div>`).join('');
  return `
  <div class="eyebrow" style="margin-top:14px"><span class="sq"></span> WASTE LOOP \u00b7 MEASURED</div>
  <h1>What actually got wasted</h1>
  <p class="sub">Touchless measurement by station feeds straight back into tomorrow's forecast.</p>
  <div class="row" style="margin-bottom:13px">
    <div class="tile"><div class="k">Yesterday</div><div class="v">${sorted.reduce((a,x)=>a+x.measuredY,0)}<small> kg</small></div></div>
    <div class="tile"><div class="k">vs 30-day goal</div><div class="v green">\u221228<small>%</small></div></div></div>
  <div class="card"><div class="eyebrow"><span class="sq"></span> BY STATION \u00b7 BY REASON</div>${rows}</div>
  <div class="card flat"><div style="font-size:13px;line-height:1.5"><b class="blue">\u21bb Closing the loop \u2014</b> top waste was <b>${sorted[0].label}</b> (over-prep). Tomorrow's opening par auto-trimmed; reads from your Winnow/Leanpath meter where installed.</div></div>`;}

function screenCadence(){const gates=[
  {hz:'T-10\u201314 DAYS',nm:'PLAN',ds:'Provisional rota + weekly dry/frozen order',c:'#16A6EC'},
  {hz:'T-3\u20135 DAYS',nm:'PROCURE',ds:'Perishable orders; confirm staffing',c:'#3E8FD0'},
  {hz:'T-1\u20132 DAYS',nm:'FIRM',ds:'Daily-fresh orders; station mix; weather',c:'#8A63C8'},
  {hz:'T-0 EVENING',nm:'PRESCRIBE',ds:'The nightly briefing \u2014 highest confidence',c:'#CE1A7E'},
  {hz:'T-0 INTRADAY',nm:'FLEX',ds:'Throttle replenishment; capture measured waste',c:'#CE1A7E'}];
  const rows=gates.map((gt,i)=>`<div class="gate"><div class="line"><div class="node" style="background:${gt.c}"></div>${i<gates.length-1?'<div class="stem"></div>':''}</div>
    <div class="body"><div class="hz">${gt.hz}</div><div class="nm">${gt.nm}</div><div class="ds">${gt.ds}</div></div></div>`).join('');
  return `
  <div class="eyebrow" style="margin-top:14px"><span class="sq"></span> WHEN IT RUNS</div>
  <h1>A rolling forecast</h1>
  <p class="sub">Re-forecast daily; commit each resource at its last responsible moment. Labour locks early &amp; coarse; food locks late &amp; fine.</p>
  <div class="card">${rows}</div>
  <div class="card flat"><div style="font-size:13px;line-height:1.5"><b class="blue">\u21bb Continuous learn \u2014</b> yesterday's measured covers + waste retrain tomorrow's forecast; the evening briefing is the last, highest-confidence gate.</div></div>`;}

function screenEsg(){const s=SCEN[state.scenario],b=computeBriefing(s);return `
  <div class="eyebrow" style="margin-top:14px"><span class="sq"></span> ESG INTELLIGENCE</div>
  <h1>Serve 360 ready</h1>
  <p class="sub">Every logged action becomes a defensible, auditable data point \u2014 no separate project.</p>
  <div class="row" style="margin-bottom:13px">
    <div class="tile"><div class="k">CO\u2082e / guest</div><div class="v green">0.34<small> kg \u2193</small></div></div>
    <div class="tile"><div class="k">Waste cut</div><div class="v">28<small>%</small></div></div></div>
  <div class="card"><div class="eyebrow"><span class="sq"></span> FRAMEWORKS</div>
    <div class="prow"><span class="nm">Marriott Serve 360</span><span class="delta up">auto-captured</span></div>
    <div class="prow"><span class="nm">Taiwan FSC / TWSE</span><span class="delta flat">draft ready</span></div>
    <div class="prow"><span class="nm">GRI</span><span class="delta flat">mapped</span></div></div>
  <div class="card"><div class="eyebrow"><span class="sq"></span> THIS MORNING</div>
    <div class="prow"><span class="nm">Over-prep avoided</span><b>NT$${b.save.toLocaleString()}</b></div>
    <div class="prow"><span class="nm">CO\u2082e reduced</span><b>${b.co2} kg</b></div>
    <div class="prow"><span class="nm">Single-use bottles avoided \u00b7 MTD</span><b>3,140</b></div></div>
  <p class="sub" style="font-size:11px">Illustrative; waste\u2192CO\u2082e measured via the waste meter, not modelled.</p>`;}

function screenOwner(){return `
  <div class="eyebrow" style="margin-top:18px"><span class="sq"></span> OWNER \u00b7 VP REGIONAL</div>
  <h1>Portfolio</h1>
  <p class="sub">Breakfast as the proof point \u2014 one validated template across the region.</p>
  <div class="row" style="margin-bottom:13px">
    <div class="tile"><div class="k">Yr-1 EBITDA uplift</div><div class="v"><small>NT$</small>1.9<small>M*</small></div></div>
    <div class="tile"><div class="k">Asset value</div><div class="v">20\u201330<small>\u00d7</small></div></div></div>
  <div class="card"><div class="eyebrow"><span class="sq"></span> PROPERTIES</div>
    <div class="prow"><div><div class="nm">W Taipei \u00b7 Xinyi <span class="badge">LIVE</span></div><div class="rs">390 rooms \u00b7 the kitchen table</div></div><div class="pr"><b class="green">\u221228%</b><small>waste</small></div></div>
    <div class="prow"><div><div class="nm">W \u2014 regional #2</div><div class="rs">pipeline \u00b7 template ready</div></div><div class="pr"><b class="faint">\u2014</b><small>Q3</small></div></div>
    <div class="prow"><div><div class="nm">Marriott portfolio</div><div class="rs">cross-brand rollout</div></div><div class="pr"><b class="faint">\u2014</b><small>2027</small></div></div></div>
  <div class="card"><div class="eyebrow"><span class="sq"></span> CROSS-SITE ESG (Serve 360)</div>
    <div class="prow"><span class="nm">W Taipei</span><span class="delta up">A</span></div>
    <div class="prow"><span class="nm">Portfolio avg</span><span class="delta flat">benchmarking\u2026</span></div></div>
  <div class="card flat"><div class="eyebrow"><span class="sq"></span> ROADMAP</div>
    <div style="font-size:13px;line-height:1.8"><b>1 \u00b7 Pilot</b> \u2014 the kitchen table (prototype, ROI + ESG)<br><b>2 \u00b7 Property</b> \u2014 all W Taipei outlets<br><b>3 \u00b7 Regional</b> \u2014 next W / Marriott<br><b>4 \u00b7 Portfolio AI</b> \u2014 cross-property brain</div></div>
  <p class="sub" style="font-size:11px">*Illustrative; calibrated on W Taipei's Week-1 baseline.</p>
  <button class="btn ghost" onclick="state.role=null;render()">\u2190 Switch role</button>`;}

/* ===================== LOG SHEET ===================== */
let logSel={type:'Over-prep',station:'Congee & Noodle'};
function openLog(){
  const types=['Over-prep','Spoilage','Cover count','Incident'];
  const ex=g('sheetbg');if(ex)ex.remove();
  const sheet=document.createElement('div');sheet.className='sheet-bg';sheet.id='sheetbg';
  sheet.onclick=e=>{if(e.target===sheet)closeLog()};
  sheet.innerHTML=`<div class="sheet"><div class="grab"></div>
    <h2>Log \u2014 voice first</h2><p class="sub" style="margin:5px 0 14px">Tap to dictate, English or \u4e2d\u6587 \u00b7 auto-fills the form \u00b7 ~22s.</p>
    <div class="mic"><div class="d">${I.mic}</div><div style="font-size:13px;font-weight:600">"Tossed about three kilos of pastry from the buffet\u2026"</div></div>
    <div class="field">Type</div><div class="opts">${types.map(t=>`<div class="opt ${logSel.type===t?'on':''}" onclick="logSel.type='${t}';openLog()">${t}</div>`).join('')}</div>
    <div class="field">Station</div><div class="opts">${STATIONS.slice(0,6).map(st=>`<div class="opt ${logSel.station===st.label?'on':''}" onclick="logSel.station='${st.label}';openLog()">${st.label}</div>`).join('')}</div>
    <button class="btn" style="margin-top:20px" onclick="closeLog();confirmToast()">Submit \u2014 auto-capture Serve 360 + Taiwan FSC</button>
    <button class="btn ghost sm" style="margin-top:9px" onclick="closeLog()">Cancel</button></div>`;
  g('phone').appendChild(sheet);
}
function closeLog(){const e=g('sheetbg');if(e)e.remove();}

/* ===================== NAV + RENDER ===================== */
const TABS=[['home','Home','home'],['brief','Brief','brief'],['bfast','Prep','bfast'],['waste','Waste','waste'],['esg','ESG','esg']];
function renderNav(){
  if(!state.role||state.role==='owner'){g('nav').style.display='none';g('fab').style.display='none';return;}
  g('nav').style.display='flex';g('fab').style.display='flex';g('fab').innerHTML=I.plus;
  g('nav').innerHTML=TABS.map(([id,lb,ic])=>`<div class="nav-item ${state.tab===id?'active':''}" onclick="go('${id}')">${I[ic]}${lb}</div>`).join('');
}
function render(){
  let html;
  if(!state.role)html=screenRole();
  else if(state.role==='owner')html=screenOwner();
  else html=({home:screenHome,brief:screenBrief,bfast:screenBfast,waste:screenWaste,cadence:screenCadence,esg:screenEsg}[state.tab]||screenHome)();
  g('screen').innerHTML=html;g('screen').scrollTop=0;renderNav();
}
function pick(r){state.role=r;state.tab='home';closeLog();render();}
function go(t){state.tab=t;render();}
function setSc(sc){state.scenario=sc;render();}
function toast(msg,color){const t=document.createElement('div');t.textContent=msg;
  t.style.cssText=`position:absolute;left:50%;bottom:100px;transform:translateX(-50%);background:${color};color:#fff;font-weight:700;padding:12px 18px;border-radius:13px;font-size:13px;z-index:20;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:88%;text-align:center`;
  g('phone').appendChild(t);setTimeout(()=>t.remove(),2000);}
function confirmToast(){toast('\u2713 Logged \u00b7 Serve 360 & Taiwan FSC auto-captured','#1C9B72');}
function shareToast(){toast('\u2913 Prep sheet sent to kitchen + GM','#1488CC');}
render();
</script>
</body>
</html>
